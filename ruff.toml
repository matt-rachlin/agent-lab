line-length = 100
target-version = "py312"
# Phase 15.1: workspace layout. ruff uses these for first-party import
# detection during isort.
src = [
    "tests",
    "packages/lab-core/src",
    "packages/lab-rag/src",
    "packages/lab-agent/src",
    "packages/lab-eval/src",
    "packages/lab-inspect/src",
    "packages/lab-sweep/src",
    "packages/lab-observability/src",
    "packages/lab-cli/src",
]

[lint]
select = [
    "E", "W", "F", "I", "B", "C4", "UP", "RUF", "SIM",
    "PT", "TID", "ASYNC", "PIE", "PLE", "PLW", "S",
]
ignore = [
    "E501",
    "S101",
    "PLW2901",
    "S607",   # partial-executable-path is fine for lab tooling that uses PATH
    "S603",   # subprocess call with shell=False is fine — we never use shell=True
    "B008",   # typer pattern: `path: Path = typer.Argument(...)` is the canonical idiom
    "S608",   # we control the SQL strings (no user input); analyze queries interpolate `experiment_slug` from CLI only
]

[lint.per-file-ignores]
"tests/**" = ["S", "PLR2004"]
"scripts/**" = ["S", "PLR2004", "RUF001"]

[format]
quote-style = "double"
indent-style = "space"
