[project]
name = "lab-inspect"
version = "0.0.1"
description = "Inspect AI bridge: adapter, solver, scorers, tools, log writer."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "lab-eval",
    "lab-agent",
    "lab-rag",
    "lab-observability",
    "inspect-ai>=0.3.226",
]

[tool.uv.sources]
lab-core = { workspace = true }
lab-eval = { workspace = true }
lab-agent = { workspace = true }
lab-rag = { workspace = true }
lab-observability = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
