[project]
name = "lab-cli"
version = "0.0.1"
description = "Lab CLI entrypoint: `lab` command + experiment/finding state."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "lab-rag",
    "lab-agent",
    "lab-eval",
    "lab-inspect",
    "lab-sweep",
    "lab-observability",
    "typer>=0.15.0",
    "rich>=13.9.0",
    "duckdb>=1.1.0",
]

[tool.uv.sources]
lab-core = { workspace = true }
lab-rag = { workspace = true }
lab-agent = { workspace = true }
lab-eval = { workspace = true }
lab-inspect = { workspace = true }
lab-sweep = { workspace = true }
lab-observability = { workspace = true }

[project.scripts]
lab = "lab.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
