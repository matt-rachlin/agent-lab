[project]
name = "lab-sweep"
version = "0.0.1"
description = "Lab sweep runner, preflight, analysis (queries, stats, report)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "lab-eval",
    "lab-inspect",
    "lab-observability",
    "duckdb>=1.1.0",
    "scipy>=1.14.0",
    "numpy>=2.1.0",
    "pandas>=2.2.0",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
    "mlflow>=2.18.0",
]

[tool.uv.sources]
lab-core = { workspace = true }
lab-eval = { workspace = true }
lab-inspect = { workspace = true }
lab-observability = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
