[project]
name = "lab-platform"
version = "0.0.1"
description = "Lab Agent Platform (LAP): agent runtime, authz, composition, control, signing, trust, verifier, model_pool."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "lab-observability",
    "pydantic>=2.9.0",
    "psycopg[binary,pool]>=3.2.0",
    "cryptography>=43.0.0",
    "httpx>=0.27.0",
]

[tool.uv.sources]
lab-core = { workspace = true }
lab-observability = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
