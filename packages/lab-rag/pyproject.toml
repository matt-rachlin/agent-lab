[project]
name = "lab-rag"
version = "0.0.1"
description = "Lab RAG: chunker, embedder, index, fetchers, rerank, cache, hype/expand."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "lancedb>=0.18.0",
    "pyarrow>=18.1.0",
    "trafilatura>=2.0.0",
    "selectolax>=0.3.27",
    "markdown-it-py>=3.0.0",
    "mdit-py-plugins>=0.4.2",
    "pymupdf>=1.25.1",
    "rank-bm25>=0.2.2",
    "tiktoken>=0.8.0",
    "httpx>=0.27.0",
    "ruamel.yaml>=0.18.0",
]

[tool.uv.sources]
lab-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
