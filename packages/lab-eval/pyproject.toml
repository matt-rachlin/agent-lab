[project]
name = "lab-eval"
version = "0.0.1"
description = "Lab evaluation framework: evaluators, scorers, judge, builtin scorers, task registry."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "lab-core",
    "scipy>=1.14.0",
    "numpy>=2.1.0",
]

[tool.uv.sources]
lab-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]
