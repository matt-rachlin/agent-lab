[project]
name = "lab-core"
version = "0.0.1"
description = "Lab core utilities: settings, manifest, notify, gpu_lease, llm, minio_io, daily_log."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Matt Rachlin", email = "mattrachlin@gmail.com" }]

dependencies = [
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "rich>=13.9.0",
    "psycopg[binary,pool]>=3.2.0",
    "redis>=5.1.0",
    "boto3>=1.35.0",
    "minio>=7.2.0",
    "ollama>=0.4.0",
    "litellm>=1.50.0",
    "httpx>=0.27.0",
    "anyio>=4.6.0",
    "python-dotenv>=1.0.0",
    "tenacity>=9.0.0",
    "python-ulid>=3.0.0",
    "platformdirs>=4.3.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lab"]

# Migrations are SQL, not Python; opt them into the wheel explicitly so
# `lab db-migrate` can find them after `pip install lab-core`.
[tool.hatch.build.targets.wheel.force-include]
"src/lab/migrations" = "lab/migrations"
