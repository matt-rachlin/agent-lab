site_name: lab
site_description: Solo AI/ML research lab notebook
site_url: ""
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: blue
      toggle:
        icon: material/weather-night
        name: dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: light

plugins:
  - search
  - awesome-pages:
      filename: .pages
      collapse_single_pages: false
  - git-revision-date-localized:
      type: iso_date
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

# Navigation is auto-generated by mkdocs-awesome-pages-plugin from .pages files.
# Edit docs/.pages to reorder the top-level sections.
