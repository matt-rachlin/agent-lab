[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = True
disallow_any_generics = True
check_untyped_defs = True
no_implicit_optional = True
plugins = pydantic.mypy
# Phase 15.1: lab is now a PEP 420 namespace package split across
# src/lab and packages/lab-*/src/lab. Tell mypy that any of those
# `src` dirs is a valid module-discovery root.
namespace_packages = True
explicit_package_bases = True
mypy_path = packages/lab-core/src:packages/lab-rag/src:packages/lab-agent/src:packages/lab-eval/src:packages/lab-inspect/src:packages/lab-sweep/src:packages/lab-observability/src:packages/lab-cli/src

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-duckdb.*]
ignore_missing_imports = True

[mypy-mlflow.*]
ignore_missing_imports = True

[mypy-ollama.*]
ignore_missing_imports = True

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-lancedb.*]
ignore_missing_imports = True

[mypy-fitz.*]
ignore_missing_imports = True

[mypy-trafilatura.*]
ignore_missing_imports = True

[mypy-selectolax.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True

