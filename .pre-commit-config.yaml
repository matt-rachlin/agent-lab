# Phase 13.1: pre-commit hooks
# Install: `pre-commit install --hook-type pre-commit --hook-type pre-push`
#   (or `just pre-commit-install` which does this automatically)
# Run all: `pre-commit run --all-files`
# Skip specific hook for one commit: SKIP=mypy git commit ...
# Skip pre-push hook for one push: SKIP=pre-push-check git push
#
# A few pre-existing files are excluded from specific whitespace/lint
# hooks (see .pre-commit-config-ignore for the residual list +
# rationale). The Phase 13.1 ruff-format exclusion (49 legacy files)
# was retired in the Phase 13.8 cleanup. New files must pass everything.

# G2: install both pre-commit and pre-push hook types by default.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ban-in-tree-backups
        name: ban in-tree backup files
        entry: >-
          bash -c
          'matches=$(printf "%s\n" "$@" | grep -E "\.bak(-|$)" | grep -E "^(packages|scripts|conf|tools|tests)/");
          if [ -n "$matches" ]; then
          printf "ERROR in-tree backups disallowed (use git stash / branches):\n%s\n" "$matches";
          exit 1; fi' --
        language: system
        types: [file]
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        # CSV exports in analysis/ are produced by pandas with CRLF; not a code
        # smell, just an export quirk. Exclude rather than churn the data.
        exclude: ^analysis/.*\.csv$
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^analysis/.*\.csv$
      - id: check-yaml
        # mkdocs.yml uses !!python tags PyYAML safe-load rejects.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        # Same reason as above — CRLF CSVs are an artifact, not a defect.
        exclude: ^analysis/.*\.csv$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        # Phase 13.8 cleanup: the 49-file legacy exclusion has been
        # retired. All files in the repo are now ruff-format clean
        # against the v0.7.4 hook. New files MUST format clean.

  # mypy --strict against src/lab/ and packages/lab-*/src/lab/. Uses repo-local
  # install so the plugin (pydantic.mypy) and our mypy.ini settings are picked
  # up. Phase 15.1: lab is now a PEP 420 namespace split across both trees.
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (lab namespace)
        entry: scripts/mypy-precommit.sh
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true

      - id: pyright
        name: pyright 2nd-opinion (packages/lab-*/src/lab)
        entry: uv run pyright packages
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
        # Phase 13.8 follow-up: the 5 known errors pyright surfaced
        # (mypy's pydantic plugin / per-module ignore_missing_imports
        # hid them) have been fixed, so pyright now runs on every
        # commit as a 2nd-opinion gate alongside mypy.

  # Use the system-installed gitleaks binary (Homebrew on this host).
  # The upstream pre-commit hook tries to `go install` gitleaks during
  # env setup, which fails on machines without a TTY for cgo. Calling
  # the binary directly sidesteps that.
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (system binary)
        entry: gitleaks protect --staged --redact --verbose
        language: system
        pass_filenames: false

  # Phase 14.6: lint markdown doc frontmatter via `m docs lint`.
  # Tolerant during the Phase 14.5 backfill — files with no frontmatter
  # pass cleanly. Only blocks on missing required fields or invalid
  # frontmatter. See ~/docs/specs/2026-05-26-doc-meta-spec.md.
  #
  # Manual run: `pre-commit run --hook-stage manual docs-lint --all-files`
  - repo: local
    hooks:
      - id: docs-lint
        name: m docs lint (markdown frontmatter)
        entry: scripts/docs-lint-precommit.sh
        language: system
        types: [markdown]
        stages: [pre-commit, manual]

  # G2: pre-push gate — blocks push if strategic docs or sweep configs are
  # untracked, if any EXP doc still has a placeholder SHA, or if .bak* files
  # are tracked. Quick bash-only check; no LLM calls, no large scans.
  - repo: local
    hooks:
      - id: pre-push-check
        name: pre-push integrity gate
        entry: scripts/pre-push-check.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
