  - slug: debug-job-state-machine
    difficulty: hard
    description: |
      Event-log state machine with three planted bugs: a missing
      paused->stop transition (the one crash-on-run bug in this
      category), jobs counted on start instead of stop, and a resume
      that fails to reset the segment start (double-counting pauses).
    input: |
      The Python project in /workspace replays a worker's job event
      log through a state machine (machine.py, main.py). Its test
      harness is run_tests.py and some tests currently fail (one even
      raises) because of logic bugs in machine.py.

      1. Run `python3 run_tests.py` and read the failure output.
      2. Fix the bugs in machine.py only. Do NOT modify run_tests.py,
         main.py, or anything under data/. The tests and the class
         docstring encode the intended behavior.
      3. Re-run the tests until every test passes.
      4. Run `python3 main.py data/events.txt` and write its exact
         stdout (both lines, unchanged) to /workspace/out.txt.

      out.txt must contain exactly the two lines the fixed program
      prints, in this format:
      MACHINE_DONE=<number>
      MACHINE_ACTIVE=<number>
    system_prompt_id: tool_use_system_v2
    tools:
      - name: shell_exec
      - name: fs_read
      - name: fs_write
    max_turns: 16
    tool_budget: 20
    sandbox:
      workspace_files:
        "machine.py": |
          class JobTracker:
              """Tracks one worker's job lifecycle from a timestamped event log.

              States: idle, running, paused. Events: start, pause, resume, stop.
              Rules:
                - start:  idle -> running; a new active segment begins
                - pause:  running -> paused; the finished segment (pause time
                          minus segment start) is added to active_secs
                - resume: paused -> running; a NEW segment begins at the resume
                          timestamp (paused time is never counted)
                - stop:   running -> idle; the final segment is added and the job
                          counts as done
                          paused -> idle; no extra time is added and the job
                          counts as done
              jobs_done counts only jobs that received a stop event.
              Any other (state, event) pair raises ValueError.
              """

              def __init__(self):
                  self.state = "idle"
                  self.jobs_done = 0
                  self.active_secs = 0
                  self.segment_start = None

              def feed(self, ts, event):
                  key = (self.state, event)
                  if key == ("idle", "start"):
                      self.state = "running"
                      self.segment_start = ts
                      self.jobs_done += 1
                  elif key == ("running", "pause"):
                      self.active_secs += ts - self.segment_start
                      self.state = "paused"
                  elif key == ("paused", "resume"):
                      self.state = "running"
                  elif key == ("running", "stop"):
                      self.active_secs += ts - self.segment_start
                      self.state = "idle"
                  else:
                      raise ValueError(
                          "protocol error: event %r in state %r" % (event, self.state))
        "main.py": |
          import sys

          from machine import JobTracker


          def main(path):
              tracker = JobTracker()
              with open(path) as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue
                      ts, event = line.split()
                      tracker.feed(int(ts), event)
              print("MACHINE_DONE=%d" % tracker.jobs_done)
              print("MACHINE_ACTIVE=%d" % tracker.active_secs)


          if __name__ == "__main__":
              main(sys.argv[1])
        "run_tests.py": |
          import sys

          failures = []

          def check(name, expected, fn):
              try:
                  actual = fn()
              except Exception as exc:
                  print("FAIL %s: raised %r" % (name, exc))
                  failures.append(name)
                  return
              if actual != expected:
                  print("FAIL %s: expected %r, got %r" % (name, expected, actual))
                  failures.append(name)
              else:
                  print("ok   %s" % name)

          from machine import JobTracker


          def run_events(events):
              t = JobTracker()
              for ts, ev in events:
                  t.feed(ts, ev)
              return t

          check("only stopped jobs count as done",
                1, lambda: run_events(
                    [(0, "start"), (10, "stop"), (20, "start")]).jobs_done)

          check("paused time is excluded from active seconds",
                7, lambda: run_events(
                    [(0, "start"), (4, "pause"), (10, "resume"),
                     (13, "stop")]).active_secs)


          def paused_stop():
              t = run_events([(0, "start"), (5, "pause"), (8, "stop")])
              return (t.jobs_done, t.active_secs, t.state)

          check("stop is legal while paused and ends the job",
                (1, 5, "idle"), paused_stop)

          if failures:
              print("%d failing test(s)" % len(failures))
              sys.exit(1)
          print("ALL TESTS GREEN")
        "data/events.txt": |
