# PBS-Agent RAG v0.2 — multi-hop research tasks with verifiable citations.
#
# Fourteen tasks over the sealed bash KB. Every answer combines facts from
# 2-3 DISTINCT chunks (verified against the corpus by /tmp/rag/verify_rag.py:
# no single non-mega chunk supports all hops, and for >= 10/14 tasks a single
# naive top-8 kb_query does not surface every supporting chunk). The agent
# must write /workspace/out.txt as:
#
#     answer=<exact answer>
#     cite=<chunk_id>          (one line per supporting chunk, >= 2)
#
# Predicate design (F-005 carry-over): the "answer=..." and "cite=..."
# substrings can never be produced by dumping raw kb_query hits into the
# file — chunk texts contain neither (verified). Where a hop's supporting
# chunk is UNIQUE in the corpus (the POSIX signal-number table; the
# wooledge job-control chunk for Ctrl-\) the predicate pins that exact
# chunk_id; otherwise it checks the cite= prefix ("cite=01KSHSN" — the
# common ULID prefix of this KB build) and full citation validity is
# delegated to scripts/citation_check.py.
#
# Two adversarial tasks (ragadv-*): the naive single query surfaces a
# plausible-but-wrong near-miss first ("$@" advice; export docs); answering
# from it fails the answer= predicate.
#
# Gold citations per task are recorded in ground_truth.json next to this
# file (hop regexes define the acceptable support sets; chunk ids shift if
# the sealed KB is ever re-chunked).

suite: pbs-agent-rag-v0.2
category: rag

tasks:

  # =======================================================================
  # Two-hop tasks (8)
  # =======================================================================

  - slug: rag2-sigabrt-status
    difficulty: medium
    description: |
      Two-hop: exit status of a process killed by SIGABRT. Hop 1: bash
      reports 128+N for death by signal N (manual / wiki exit-status
      chunks). Hop 2: SIGABRT is signal 6 — in this corpus that mapping
      exists ONLY in the POSIX trap signal-number table chunk
      (01KSHSNCTPNG46M876KPZ81751), so the predicate pins it.
      Answer: 134.
    input: |
      Question: A process is terminated by the SIGABRT signal. What
      numeric exit status does bash report in $? for it?

      Work ONLY from passages retrieved with the kb_query tool
      (kb_name='bash'). The answer combines facts that live in DIFFERENT
      parts of the KB — a single query will not surface all of them.
      Issue multiple targeted kb_query calls until every fact you need
      (including the signal's NUMBER) is grounded in a retrieved chunk.

      Then write the file 'out.txt' (fs_write, mode='create') in EXACTLY
      this format and nothing else:
        line 1:            answer=<the number, digits only>
        following lines:   cite=<chunk_id>   (one line per supporting
                           chunk, chunk_id exactly as returned by
                           kb_query; cite every chunk your answer relies
                           on — at least two)
      Then reply 'done'.
    system_prompt_id: rag_grounded_v1
    tools:
      - name: kb_query
      - name: fs_write
    max_turns: 8
    tool_budget: 10
    success_predicate:
      type: all_of
      predicates:
        - type: workspace_file_contains
          path: out.txt
          substring: "answer=134"
        - type: workspace_file_contains
          path: out.txt
          substring: "cite=01KSHSNCTPNG46M876KPZ81751"
    rubric:
      type: tool_call
      target_tool: kb_query
      expected_args:
        kb_name: bash

