      argument and is wrong here. The correct answer requires the
      word-splitting rule (only expansions NOT inside double quotes are
      split) plus the quote-omission guidance. Answer: unquoted.
    input: |
      Question: The variable flags='-a -b -c' must be passed to a
      command as THREE separate arguments (POSIX-compatible script, no
      arrays). When you write $flags on the command line, should the
      expansion be double-quoted or left unquoted?

      Careful: the most commonly repeated quoting advice gives the
      WRONG result for this specific requirement. Work ONLY from
      passages retrieved with the kb_query tool (kb_name='bash') and
      ground BOTH halves: the rule that says which expansions undergo
      word splitting, and the guidance about when quotes may be
      omitted. That takes facts from different parts of the KB — issue
      multiple targeted kb_query calls.

      Then write the file 'out.txt' (fs_write, mode='create') in EXACTLY
      this format and nothing else:
        line 1:            answer=<exactly one word: quoted or unquoted>
