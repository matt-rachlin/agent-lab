  - slug: ragadv-star-single-arg
    difficulty: hard
    description: |
      Adversarial two-hop. The naive query for "pass all positional
      parameters as one argument" top-ranks "$@" advice chunks
      (wooledge Quotes, shellcheck) — the near-miss: "$@" expands to
      SEPARATE words and is the wrong answer here. The correct answer
      "$*" needs the $*-joins-with-first-IFS-char chunk plus the
      IFS-default chunk. Answer: "$*" (with the double quotes).
    input: |
      Question: How do you pass ALL positional parameters to a command
      as ONE single argument (a single word, parameters separated by
      spaces, IFS untouched)?

      Careful: the obvious, commonly recommended form does the OPPOSITE
      (it produces one word per parameter). Work ONLY from passages
      retrieved with the kb_query tool (kb_name='bash') and make sure
      the retrieved text actually supports the single-word behaviour
      AND tells you which character the parameters get joined with by
      default. That takes facts from different parts of the KB — issue
      multiple targeted kb_query calls.

      Then write the file 'out.txt' (fs_write, mode='create') in EXACTLY
      this format and nothing else:
        line 1:            answer=<the quoted parameter, exactly, e.g.
                           answer="$X">
        following lines:   cite=<chunk_id>   (one per supporting chunk,
                           at least two, ids exactly as returned by
                           kb_query)
      Then reply 'done'.
    system_prompt_id: rag_grounded_v1
    tools:
      - name: kb_query
      - name: fs_write
    max_turns: 10
    tool_budget: 12
    success_predicate:
