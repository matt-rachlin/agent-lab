  # -------------------------------------------------------------------------
  - slug: data-json-flatten-top-spender
    difficulty: hard
    description: |
      Parse a nested JSON array of users each containing an events list.
      Filter to purchase-type events only, sum amounts per user, find top
      spender. Tests JSON traversal, filtering, and aggregation.
    input: |
      Your workspace contains data/users.json — a JSON array. Each element
      has fields: user_id, name, and events (array of objects with type and
      amount fields).

      For each user, sum the amount of all events where type == "purchase".
      Find the user with the highest total purchase amount.

      Write their name (exactly as it appears in the JSON) to
      /workspace/result.txt — no extra text, no trailing newline.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "data/users.json": |
          [
            {"user_id": "u1", "name": "Alice", "events": [
              {"type": "purchase", "amount": 49.99},
              {"type": "purchase", "amount": 129.00},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 19.50}
            ]},
            {"user_id": "u2", "name": "Bob", "events": [
              {"type": "purchase", "amount": 299.00},
              {"type": "purchase", "amount": 15.00},
              {"type": "view", "amount": 0}
            ]},
            {"user_id": "u3", "name": "Carol", "events": [
              {"type": "view", "amount": 0},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 89.99}
            ]},
            {"user_id": "u4", "name": "Dave", "events": [
              {"type": "purchase", "amount": 450.00},
              {"type": "purchase", "amount": 75.25},
              {"type": "purchase", "amount": 30.00}
            ]},
            {"user_id": "u5", "name": "Eve", "events": [
              {"type": "purchase", "amount": 199.99},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 299.99}
            ]}
          ]
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "Dave"

  # -------------------------------------------------------------------------
  - slug: data-duplicate-transaction-count
    difficulty: hard
    description: |
      Detect duplicate rows in a transactions CSV (same txn_id appearing more
      than once). Count how many DISTINCT transaction IDs are duplicated (not
      the total extra rows, but the count of IDs that appear more than once).
      Edge: must count distinct IDs, not total duplicate rows.
    input: |
      Your workspace contains data/transactions.csv with columns:
        txn_id, customer_id, amount, date

      Some transaction IDs appear more than once (duplicate rows). Count
      the number of DISTINCT txn_id values that appear more than once in
      the file (i.e., the count of IDs with duplicates, not the total
      number of extra rows).

      Write the count as a plain integer to /workspace/result.txt.
      No extra text.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "data/transactions.csv": |
          txn_id,customer_id,amount,date
          T001,C01,150.00,2024-01-01
          T002,C02,200.00,2024-01-02
          T001,C01,150.00,2024-01-01
          T003,C03,75.50,2024-01-03
          T004,C04,300.00,2024-01-04
          T002,C02,200.00,2024-01-02
          T005,C05,125.00,2024-01-05
          T003,C03,75.50,2024-01-03
          T006,C06,450.00,2024-01-06
          T007,C07,90.00,2024-01-07
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "3"

  # -------------------------------------------------------------------------
  - slug: data-inventory-turnover
    difficulty: hard
    description: |
      Compute inventory turnover rate (COGS / average inventory) for each
      product. Skip products where average inventory is zero. Find and report
      the product name with the highest turnover rate. Edge: Doohickey has
      COGS=0 but non-zero inventory — must not be confused with the zero-avg
      exclusion, and Gadget Y has very low inventory making it the winner.
    input: |
      Your workspace contains data/inventory.csv with columns:
        product_id, product_name, begin_inventory, end_inventory, cogs

      For each product compute:
        avg_inventory = (begin_inventory + end_inventory) / 2
        turnover_rate = cogs / avg_inventory

      Skip any product where avg_inventory == 0.
      Find the product with the HIGHEST turnover_rate.

      Write its product_name (exactly as in the CSV) to /workspace/result.txt.
      No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "data/inventory.csv": |
          product_id,product_name,begin_inventory,end_inventory,cogs
          P001,Widget A,500,320,3600
          P002,Widget B,200,180,400
          P003,Gadget X,1000,850,4500
          P004,Gadget Y,50,20,780
          P005,Doohickey,300,300,0
          P006,Thingamajig,150,90,2160
          P007,Whatsit,800,600,7000
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "Gadget Y"

  # -------------------------------------------------------------------------
  - slug: data-payment-reconciliation
    difficulty: hard
    description: |
      Reconcile two CSV files (expected payments vs bank statement). Identify
      three categories of issue: amount mismatches (same ID, different amount),
      missing entries (in expected but not in bank), and unexpected entries
      (in bank but not in expected). Write a structured summary report.
      Multi-file join + categorized diff.
    input: |
      Your workspace contains two CSV files:
        data/expected_payments.csv  — columns: payment_id, vendor, amount, date
        data/bank_statement.csv     — columns: ref_id, vendor, amount, date

      Join on payment_id == ref_id. Categorize every discrepancy:
        - MISMATCH: same ID in both files but amounts differ
        - MISSING: ID in expected but absent from bank
        - UNEXPECTED: ID in bank but absent from expected

      Write to /workspace/result.txt exactly 3 lines (one per category, sorted
      alphabetically by category label), in this format:
        MISSING:<payment_id>
        MISMATCH:<payment_id>
        UNEXPECTED:<payment_id>
      where each value is the relevant ID. No extra text.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 10
    tool_budget: 12
    sandbox:
      workspace_files:
        "data/expected_payments.csv": |
          payment_id,vendor,amount,date
          PAY001,Acme Corp,1500.00,2024-02-01
          PAY002,Beta LLC,750.50,2024-02-03
          PAY003,Acme Corp,200.00,2024-02-05
          PAY004,Gamma Inc,3200.00,2024-02-07
          PAY005,Delta Co,450.00,2024-02-09
          PAY006,Beta LLC,1100.00,2024-02-11
          PAY007,Acme Corp,825.75,2024-02-13
          PAY008,Gamma Inc,600.00,2024-02-15
        "data/bank_statement.csv": |
          ref_id,vendor,amount,date
          PAY001,Acme Corp,1500.00,2024-02-01
          PAY002,Beta LLC,750.50,2024-02-03
          PAY003,Acme Corp,200.00,2024-02-05
          PAY004,Gamma Inc,3100.00,2024-02-07
          PAY005,Delta Co,450.00,2024-02-09
          PAY006,Beta LLC,1100.00,2024-02-11
