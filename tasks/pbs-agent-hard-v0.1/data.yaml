  # -------------------------------------------------------------------------
  - slug: data-jsonl-session-median-duration
    difficulty: hard
    description: |
      Parse a JSONL event stream with session lifecycle events (start/action/
      error/end). Identify sessions that had at least one error event. For
      those sessions, compute duration (end_ts - start_ts). Find the median
      duration. Edge: must exclude sessions without errors, must handle the
      median of an odd-count list, must filter to sessions that have both
      start and end events.
    input: |
      Your workspace contains data/events.jsonl — one JSON object per line.
      Each object has fields: session_id, event, ts (Unix timestamp), user.
      event values are: "start", "action", "error", "end".

      1. Find all session_ids that have at least one event with event=="error".
      2. For each such session that also has both a "start" and "end" event,
         compute duration = end_ts - start_ts (in seconds).
      3. Compute the median of those durations. For an odd count of values,
         the median is the middle value of the sorted list.

      Write the median as a plain integer to /workspace/result.txt.
      No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 10
    tool_budget: 12
    sandbox:
      workspace_files:
        "data/events.jsonl": |
          {"session_id":"S001","event":"start","ts":1700000000,"user":"alice"}
          {"session_id":"S002","event":"start","ts":1700000010,"user":"bob"}
          {"session_id":"S001","event":"action","ts":1700000045,"user":"alice"}
          {"session_id":"S003","event":"start","ts":1700000050,"user":"carol"}
          {"session_id":"S002","event":"error","ts":1700000060,"user":"bob"}
          {"session_id":"S001","event":"action","ts":1700000090,"user":"alice"}
          {"session_id":"S004","event":"start","ts":1700000100,"user":"dave"}
          {"session_id":"S002","event":"end","ts":1700000110,"user":"bob"}
          {"session_id":"S003","event":"action","ts":1700000120,"user":"carol"}
          {"session_id":"S001","event":"error","ts":1700000150,"user":"alice"}
