# PBS-Agent-Hard v0.1 — DATA category tasks.
#
# Eight tasks covering CSV joins/aggregation, log parsing, JSON reshaping,
# duplicate detection, derived metrics, reconciliation, multi-file pipelines,
# and JSONL stream analysis. Designed to require correct filtering, grouping,
# ordering, and edge-case handling.

suite: pbs-agent-hard-v0.1
category: data

tasks:

  # -------------------------------------------------------------------------
  - slug: data-csv-join-revenue-by-region
    difficulty: medium
    description: |
      Join two CSVs (orders + customers) on customer_id, filter to completed
      orders only, aggregate total revenue per region, and report the region
      with the highest completed revenue. Tests join logic and status filtering.
    input: |
      You have two CSV files in your workspace:
        data/orders.csv    — columns: order_id, customer_id, amount, status
        data/customers.csv — columns: customer_id, name, region

      Join them on customer_id. Consider ONLY orders with status="completed".
      Sum the amount for each region. Find the region with the highest total
      completed revenue.

      Write a single line to /workspace/result.txt in exactly this format:
        <region>,<total>
      where <total> is formatted to 2 decimal places (e.g. South,1020.50).
      No extra text, no newline after the value.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "data/orders.csv": |
          order_id,customer_id,amount,status
          1001,C01,250.00,completed
          1002,C02,180.50,completed
          1003,C03,430.00,cancelled
          1004,C01,90.00,completed
          1005,C04,320.75,completed
          1006,C02,150.00,refunded
          1007,C05,200.00,completed
          1008,C03,510.00,completed
          1009,C04,75.50,cancelled
          1010,C05,640.00,completed
        "data/customers.csv": |
          customer_id,name,region
          C01,Alice,North
          C02,Bob,South
          C03,Carol,East
          C04,Dave,North
          C05,Eve,South
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "South,1020.50"

  # -------------------------------------------------------------------------
  - slug: data-log-parse-p95-latency
    difficulty: medium
    description: |
      Parse a structured access log (space-separated fields including level,
      method, endpoint, HTTP status, and latency). Compute the p95 latency
      (ceil(0.95*n)-th value in sorted order) across ALL requests and write
      it. Tests log parsing and percentile arithmetic.
    input: |
      Your workspace contains data/access.log. Each line has the format:
        <timestamp> <LEVEL> <METHOD> <endpoint> <status> <latency>ms

      Parse every line. Sort all latency values ascending. Compute the p95
      latency using the formula: value at index ceil(0.95 * n) - 1 (0-based)
      where n is the total number of log lines.

      Write the p95 latency as a plain integer (milliseconds, no "ms" suffix,
      no other text) to /workspace/result.txt.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "data/access.log": |
          2024-01-15T08:00:01Z INFO  GET /api/users 200 45ms
          2024-01-15T08:00:03Z INFO  GET /api/products 200 120ms
          2024-01-15T08:00:05Z ERROR GET /api/orders 500 2340ms
          2024-01-15T08:00:07Z INFO  POST /api/users 201 88ms
          2024-01-15T08:00:09Z INFO  GET /api/products 200 95ms
          2024-01-15T08:00:11Z ERROR GET /api/users 503 1200ms
          2024-01-15T08:00:13Z INFO  GET /api/orders 200 310ms
          2024-01-15T08:00:15Z INFO  DELETE /api/users 200 55ms
          2024-01-15T08:00:17Z INFO  GET /api/products 200 78ms
          2024-01-15T08:00:19Z ERROR POST /api/orders 500 890ms
          2024-01-15T08:00:21Z INFO  GET /api/users 200 42ms
          2024-01-15T08:00:23Z INFO  GET /api/products 200 105ms
          2024-01-15T08:00:25Z INFO  GET /api/orders 200 220ms
          2024-01-15T08:00:27Z INFO  PUT /api/users 200 67ms
          2024-01-15T08:00:29Z INFO  GET /api/products 200 130ms
          2024-01-15T08:00:31Z ERROR GET /api/orders 500 3100ms
          2024-01-15T08:00:33Z INFO  GET /api/users 200 39ms
          2024-01-15T08:00:35Z INFO  GET /api/products 200 112ms
          2024-01-15T08:00:37Z INFO  POST /api/users 201 77ms
          2024-01-15T08:00:39Z INFO  GET /api/orders 200 185ms
