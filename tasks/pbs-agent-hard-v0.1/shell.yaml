          10.0.0.3 - - [10/Jun/2026:10:00:16 +0000] "GET /api/data/export 500 9455"
          10.0.0.4 - - [10/Jun/2026:10:00:17 +0000] "GET /api/report 200 3200"
          10.0.0.1 - - [10/Jun/2026:10:00:18 +0000] "POST /api/login 200 511"
