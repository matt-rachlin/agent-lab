          substring: "POST /api/login 330 40.0"

  # ---------------------------------------------------------------------------
  - slug: shell-fragment-reassembly
    difficulty: hard
    description: |
      Reassemble a text message from numbered fragment files stored in random
      order. Fragment files are named frag_NN.dat (zero-padded two-digit
      sequence number). The agent must list, sort numerically, concatenate in
      order, and write the assembled text. Tests directory listing, numeric sort,
      and multi-file concatenation without introducing extra whitespace.
    input: |
      The workspace directory 'fragments/' contains files named frag_NN.dat
      where NN is a zero-padded two-digit sequence number (01, 02, ...).
      Each file contains a fragment of a sentence with NO trailing newline.

      Task:
      1. List all files in fragments/.
      2. Sort them by their numeric sequence number (01 before 02, etc.).
      3. Concatenate their contents in that order with no separators between fragments.
      4. Write the assembled text (exactly, with a single trailing newline) to
         /workspace/out.txt via fs_write.

      The assembled text must be reproduced character-for-character.
    system_prompt_id: tool_use_system_v1
    tools:
      - name: shell_exec
      - name: fs_read
      - name: fs_write
    max_turns: 10
    tool_budget: 14
    sandbox:
      workspace_files:
        "fragments/frag_03.dat": "tion is the mother of "
        "fragments/frag_07.dat": "ion leads to clarity."
        "fragments/frag_01.dat": "Simplifica"
        "fragments/frag_05.dat": "n. Clear th"
        "fragments/frag_02.dat": "tion is powerful. Repeti"
        "fragments/frag_06.dat": "inking and communicat"
        "fragments/frag_04.dat": "inventio"
    success_predicate:
      type: workspace_file_contains
      path: out.txt
      substring: "Simplification is powerful. Repetition is the mother of invention. Clear thinking and communication leads to clarity."

  # ---------------------------------------------------------------------------
  - slug: shell-tsv-dedup-median-by-dept
    difficulty: hard
    description: |
      Multi-pass TSV transformation pipeline: normalize mixed-case names to Title
      Case, deduplicate employee records by ID keeping the highest score, then
      compute the median score per department and output results sorted by median
      descending. Requires handling even-length sets (median = average of two
      middle values) and precise numeric formatting.
    input: |
      The workspace has 'employees.tsv' (tab-separated, first line is header:
      id, name, dept, score).

      Pipeline:
      1. Skip the header row. Parse each row's id, name, dept, score fields.
      2. Normalize each name to Title Case (each word capitalized).
      3. Deduplicate by id: if an id appears multiple times, keep only the record
         with the HIGHEST score (any name/dept value for that id is fine).
      4. Group the surviving records by dept and compute the median score:
         - Odd count: middle value when sorted.
         - Even count: average of the two middle values (may be a decimal like 77.5).
      5. Output lines as: dept:median — sorted by median DESCENDING.
         Format median as integer if whole (e.g. 91), or with one decimal if fractional (e.g. 77.5).
         For ties in median, sort dept name ascending.

      Write the result to /workspace/out.txt via fs_write (one dept per line).
    system_prompt_id: tool_use_system_v1
    tools:
      - name: shell_exec
      - name: fs_read
      - name: fs_write
    max_turns: 10
    tool_budget: 16
    sandbox:
      workspace_files:
        "employees.tsv": "id\tname\tdept\tscore\nE001\talice JOHNSON\tEngineering\t87\nM001\tBob smith\tMarketing\t72\nE002\tCAROL Williams\tEngineering\t94\nH001\tdave BROWN\tHR\t65\nE001\talice johnson\tEngineering\t91\nM002\teve DAVIS\tMarketing\t83\nE003\tFRANK miller\tEngineering\t78\nH002\tGRACE wilson\tHR\t70\nM001\tbob SMITH\tMarketing\t68\nE002\tcarol WILLIAMS\tEngineering\t89\n"
    success_predicate:
      type: all_of
      predicates:
        - type: workspace_file_contains
          path: out.txt
          substring: "Engineering:91"
        - type: workspace_file_contains
          path: out.txt
          substring: "Marketing:77.5"
        - type: workspace_file_contains
          path: out.txt
          substring: "HR:67.5"
