  # -------------------------------------------------------------------------
  - slug: code-sample-variance-fix
    difficulty: hard
    description: |
      Fix a statistics bug (population variance used instead of sample
      variance, N vs N-1 denominator), run the fixed function on provided
      data, and write the result rounded to 2 decimal places. Requires
      reading multiple files, identifying the subtle mathematical error,
      fixing it, and computing the output.
    input: |
      The project under 'src/' contains a statistics module with a bug.
      Use fs_grep to locate the variance function, read the relevant file,
      identify the mathematical error, fix it, then run it on the data
      in 'data/samples.txt' (one integer per line).
      The correct formula for SAMPLE variance uses (N-1) in the denominator,
      not N (which is population variance).
      Round the result to 2 decimal places.
      Write the result to 'answer.txt' via fs_write mode='create'.
      Write ONLY the number (e.g. "17.98"), no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: fs_grep
      - name: python_eval
      - name: shell_exec
    max_turns: 12
    tool_budget: 16
    sandbox:
      workspace_files:
        "src/stats/__init__.py": ""
        "src/stats/variance.py": |
          def mean(data):
              return sum(data) / len(data)

          def variance(data):
              """Compute variance of data.

              Note: uses population formula (divides by N).
              TODO: switch to sample variance (divide by N-1).
              """
              m = mean(data)
              # BUG: divides by len(data) instead of len(data)-1
              return sum((x - m) ** 2 for x in data) / len(data)

          def std_dev(data):
              import math
              return math.sqrt(variance(data))
        "src/stats/summary.py": |
          from .variance import variance, mean, std_dev

          def summarize(data):
              return {
                  'mean': mean(data),
                  'variance': variance(data),
                  'std_dev': std_dev(data),
                  'n': len(data),
              }
        "src/main.py": |
          import sys, os
          sys.path.insert(0, os.path.dirname(__file__))
          from stats.variance import variance

          if __name__ == '__main__':
              with open('data/samples.txt') as f:
                  data = [int(line.strip()) for line in f if line.strip()]
              print(round(variance(data), 2))
        "data/samples.txt": |
          4
          7
          13
          2
          1
          9
          11
          6
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "17.98"

  # -------------------------------------------------------------------------
  - slug: code-expr-parser-fix
    difficulty: hard
    description: |
      Fix operator-precedence bug in a recursive-descent expression parser
      (* and + have swapped precedence), run it on a test expression, and
      write the result. Requires understanding parser structure, fixing
      grammar rules, and verifying output.
    input: |
      The file 'src/parser.py' contains a recursive-descent expression
      parser for arithmetic expressions with +, *, and parentheses.
      The parser has a bug: the precedence of * and + is swapped, so
      "2 + 3 * 4" evaluates to 20 instead of 14.
      Your task:
      1. Read the file with fs_read.
      2. Fix the operator-precedence bug (in correct arithmetic, * binds
         tighter than +: parse_expr handles +, parse_term handles *).
      3. Overwrite the file with the fixed version using fs_write mode='overwrite'.
      4. Run 'python3 src/parser.py' with shell_exec and confirm the output
         is correct.
      5. Write the result of evaluating "2 + 3 * 4 + (5 + 2) * 3" to
         'answer.txt' via fs_write mode='create'.
      Write ONLY the integer result, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 12
    tool_budget: 15
    sandbox:
      workspace_files:
        "src/parser.py": |
          def evaluate(expr: str) -> int:
              """Evaluate an arithmetic expression with +, *, and parentheses.

              BUG: operator precedence is swapped — parse_expr handles *
              and parse_term handles +, but it should be the other way around
              (* binds tighter than +).
              """
              expr = expr.replace(' ', '')
              pos = [0]

              def parse_expr():
                  # BUG: this level should handle +, not *
                  val = parse_term()
                  while pos[0] < len(expr) and expr[pos[0]] == '*':
                      pos[0] += 1
                      val *= parse_term()
                  return val

              def parse_term():
                  # BUG: this level should handle *, not +
                  val = parse_factor()
                  while pos[0] < len(expr) and expr[pos[0]] == '+':
                      pos[0] += 1
                      val += parse_factor()
                  return val

              def parse_factor():
                  if expr[pos[0]] == '(':
                      pos[0] += 1
                      val = parse_expr()
                      pos[0] += 1  # skip ')'
                      return val
                  start = pos[0]
                  while pos[0] < len(expr) and expr[pos[0]].isdigit():
                      pos[0] += 1
                  return int(expr[start:pos[0]])

              return parse_expr()

          if __name__ == '__main__':
              tests = [
                  ("2 + 3 * 4", 14),
                  ("2 + 3 * 4 + (5 + 2) * 3", 35),
              ]
              all_ok = True
              for expr, expected in tests:
                  result = evaluate(expr)
                  status = "OK" if result == expected else f"FAIL (got {result}, want {expected})"
                  print(f"  {expr!r} = {result}  {status}")
                  if result != expected:
                      all_ok = False
              if all_ok:
                  print("All tests passed")
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "35"

