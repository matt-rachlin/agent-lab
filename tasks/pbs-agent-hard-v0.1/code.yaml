  - slug: code-fibonacci-bug-fix
    difficulty: hard
    description: |
      Find a subtle base-case bug in a recursive Fibonacci implementation
      spread across multiple files, fix it, and run it to produce the
      correct fib(10). The bug: the base case handles n<=0 -> 0 and n==2 -> 1
      but misses n==1 -> 1, causing fib(1)=0 and every subsequent value off
      by one.
    input: |
      The workspace contains a multi-file project under 'src/'. One of the
      Python files has a buggy recursive Fibonacci function. Your task:
      1. Use fs_grep to find which file contains the Fibonacci implementation.
      2. Read that file with fs_read and identify the base-case bug.
      3. Fix the file using fs_write mode='overwrite' with the corrected code.
      4. Run 'python3 src/math/fib.py' with shell_exec to confirm it prints
         the correct value for fib(10).
      5. Write the integer result of fib(10) to 'answer.txt' via fs_write
         mode='create'.
      Write ONLY the integer, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: fs_grep
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 14
    sandbox:
      workspace_files:
        "src/math/fib.py": |
          def fib(n: int) -> int:
              """Return the nth Fibonacci number (0-indexed: fib(0)=0, fib(1)=1)."""
              if n <= 0:
                  return 0
              if n == 2:   # BUG: missing n == 1 case; fib(1) falls through to recursion
                  return 1
              return fib(n - 1) + fib(n - 2)

          if __name__ == '__main__':
              print(fib(10))
        "src/math/__init__.py": ""
        "src/utils/helpers.py": |
          # Utility helpers — not related to Fibonacci
          def clamp(val, lo, hi):
              return max(lo, min(hi, val))
        "src/main.py": |
          from math.fib import fib
          # Entry point — imports fib but does not define it
          if __name__ == '__main__':
              for i in range(11):
                  print(f"fib({i}) = {fib(i)}")
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "55"

