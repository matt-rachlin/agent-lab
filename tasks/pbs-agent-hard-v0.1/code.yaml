    difficulty: medium
    description: |
      Implement Kahn's algorithm (BFS topological sort) on a DAG encoded in
      a Python file, run it, and write the result. Tests algorithm
      implementation and execution via python_eval/shell_exec.
    input: |
      The file 'src/graph.py' defines a directed acyclic graph as an
      adjacency list (dict mapping node -> list of successors) and a list
      of directed edges. Your task:
      1. Read the file with fs_read.
      2. Implement Kahn's algorithm (BFS-based topological sort) and run it
         on the graph using python_eval or shell_exec. When multiple nodes
         have in-degree 0 at the same time, process them in alphabetical
         order (use a sorted list as the queue).
      3. Write the resulting node order as a comma-separated string
         (e.g. "A,B,C") to 'answer.txt' using fs_write mode='create'.
      Write ONLY the comma-separated node names, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "src/graph.py": |
          # Directed edges: (from_node, to_node) means from_node must come before to_node
          edges = [
              ('parse', 'typecheck'),
              ('parse', 'codegen'),
              ('typecheck', 'codegen'),
              ('codegen', 'link'),
              ('link', 'package'),
          ]

          # Adjacency list derived from edges above
          graph = {
              'parse':     ['typecheck', 'codegen'],
              'typecheck': ['codegen'],
              'codegen':   ['link'],
              'link':      ['package'],
              'package':   [],
          }
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "parse,typecheck,codegen,link,package"

  # -------------------------------------------------------------------------
  - slug: code-interval-merge-fix
    difficulty: medium
    description: |
      Find and fix a subtle off-by-one bug in an interval-merging function,
      run it on provided test data, and write the merged intervals. The bug
      is using strict less-than instead of less-than-or-equal for the overlap
      check, causing adjacent intervals to not be merged.
    input: |
      The file 'src/intervals.py' contains a function merge_intervals() with
      a subtle bug. The function should merge overlapping or touching intervals
      (e.g. [1,3] and [3,5] should merge to [1,5]) but currently misses some
      merges. Your task:
      1. Read the file with fs_read.
      2. Identify and fix the bug.
      3. Run the fixed function on this input:
         intervals = [(1, 3), (3, 5), (6, 9), (8, 11)]
      4. Write the result to 'answer.txt' as semicolon-separated intervals,
         each interval as "start,end" — for example: "1,5;6,11"
      Write ONLY the interval string, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: fs_grep
      - name: python_eval
      - name: shell_exec
    max_turns: 8
    tool_budget: 10
    sandbox:
      workspace_files:
        "src/intervals.py": |
          def merge_intervals(intervals):
              """Merge overlapping intervals. Returns list of (start, end) tuples."""
              if not intervals:
                  return []
              intervals = sorted(intervals)
              merged = [list(intervals[0])]
              for start, end in intervals[1:]:
                  # BUG: should be <= not < (adjacent intervals must also merge)
                  if start < merged[-1][1]:
                      merged[-1][1] = max(merged[-1][1], end)
                  else:
                      merged.append([start, end])
              return [tuple(x) for x in merged]

          if __name__ == '__main__':
              test = [(1, 3), (3, 5), (6, 9), (8, 11)]
              print(merge_intervals(test))
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "1,5;6,11"

