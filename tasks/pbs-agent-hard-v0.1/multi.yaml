      JSON, count TODOs per file, compute weighted scores (count × weight),
      and identify the highest-priority file. Requires discovery → read each
      found file → join with external weights → rank.
    input: |
      You have a small codebase under 'src/' with Python files, and a
      'config/priority_map.json' that assigns an integer weight to each file.

      Your task:
      1. Use fs_grep (or shell_exec with grep) to find all files under 'src/'
