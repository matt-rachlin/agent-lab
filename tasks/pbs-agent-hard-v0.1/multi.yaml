      2. For each file that contains TODOs, use fs_read to read it and count
         the total occurrences of "TODO" in that file.
      3. Read 'config/priority_map.json' to get the weight for each file.
      4. Compute weighted_score = todo_count * weight for each file.
      5. Find the file with the HIGHEST weighted score.
