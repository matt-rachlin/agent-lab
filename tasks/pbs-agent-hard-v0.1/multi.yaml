  # -------------------------------------------------------------------------
  - slug: multi-event-session-http-enrich
    difficulty: hard
    description: |
      Multi-phase event log pipeline: parse a JSONL event stream to compute
      per-session durations, fetch session metadata via HTTP to get labels,
      filter to labeled sessions, compute average duration, and write the
      result. Requires JSONL parsing, session aggregation, HTTP enrichment,
      cross-document filter, and arithmetic — 4 distinct data-processing phases.
    input: |
      Read 'data/events.jsonl' — one JSON object per line with fields:
        ts (unix timestamp), session_id (string), event ("start"|"action"|"end")

      For each session_id, compute duration = end.ts - start.ts (in seconds).
      Ignore sessions without both a start and end event.

      Use http_fetch to GET http://example.net/api/session_metadata.json.
      This returns {"sessions": {<session_id>: {"labeled": bool, "user": str}, ...}}.

      Filter to sessions where labeled == true.
      Compute the arithmetic mean duration of those labeled sessions.
      Round to 1 decimal place.

      Write the mean (e.g. "260.0") to 'output/avg_labeled_duration.txt'
      using fs_write mode='create'.
      Reply with the mean and which sessions were included.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: http_fetch
      - name: python_eval
    max_turns: 16
    tool_budget: 18
    sandbox:
      network: ["example.net"]
      env:
        LAB_HTTP_ALLOWLIST: "example.net"
        LAB_HTTP_FIXTURE_DIR: "/workspace/_http_fixtures"
      workspace_files:
        "data/events.jsonl": |
          {"ts": 1700000000, "session_id": "s1", "event": "start"}
          {"ts": 1700000050, "session_id": "s2", "event": "start"}
          {"ts": 1700000120, "session_id": "s1", "event": "action"}
          {"ts": 1700000180, "session_id": "s3", "event": "start"}
          {"ts": 1700000240, "session_id": "s2", "event": "action"}
          {"ts": 1700000300, "session_id": "s1", "event": "end"}
          {"ts": 1700000360, "session_id": "s3", "event": "action"}
          {"ts": 1700000420, "session_id": "s2", "event": "end"}
          {"ts": 1700000500, "session_id": "s4", "event": "start"}
          {"ts": 1700000540, "session_id": "s3", "event": "end"}
          {"ts": 1700000620, "session_id": "s4", "event": "end"}
        "_http_fixtures/example.net/api/session_metadata.json": |
          {"sessions": {"s1": {"labeled": true, "user": "alice"}, "s2": {"labeled": false, "user": "bob"}, "s3": {"labeled": true, "user": "carol"}, "s4": {"labeled": true, "user": "alice"}}}
    success_predicate:
