suite: agent-smoke
category: smoke

tasks:
  - slug: fs-read-smoke
    difficulty: easy
    input: |
      You MUST call the fs_read tool with path="note.txt" to read the file.
      Then return its content verbatim. Do not guess — call the tool first.
    system: "You are an assistant with tool access. Always call the fs_read tool when asked to read a file."
    tools:
      - name: fs_read
    max_turns: 3
    tool_budget: 2
    sandbox:
      workspace_files:
        "note.txt": "hello from agent-smoke"
    rubric:
      type: exact_match
      case_sensitive: false
    gold_answer: "hello from agent-smoke"

  - slug: fs-write-scorer-smoke
    difficulty: easy
    description: |
      Exercise the 6e scorer pipeline end-to-end: success_predicate
      checks the workspace file, tool_call rubric checks fs_write was
      called with the right path, budget_respected always fires.
    input: |
      Use the fs_write tool to write the literal text 'PASS' to a file at
      path 'answer.txt' (mode 'overwrite'). Then reply with the word
      'done' and stop.
    system: "You are an assistant with tool access. Always use tools when asked."
    tools:
      - name: fs_write
    max_turns: 3
    tool_budget: 2
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: PASS
    rubric:
      type: tool_call
      target_tool: fs_write
      expected_args:
        path: answer.txt

  - slug: kb-query-smoke
    difficulty: easy
    description: |
      Wiring smoke for the kb_query MCP tool. The bash KB is still
      `enrichment_pending` (0 indexed rows), so the tool short-circuits to
      the empty-KB path. The point is to verify the agent harness mounts the
      KB root, spawns the tool, and gets back a clean empty result — the
      indexing itself is 6h-d's problem.
    input: |
      Use the kb_query tool with kb_name="bash" and
      question="how do I redirect stderr to stdout" to search the bash
      knowledge base. Then return the value of the "kb_status" field from
      the result (it will be "empty" because the KB is not yet indexed).
    system: "You are an assistant with tool access. Always use tools when asked."
    tools:
      - name: kb_query
    max_turns: 3
    tool_budget: 2
    rubric:
      type: tool_call
      target_tool: kb_query
      expected_args:
        kb_name: bash
