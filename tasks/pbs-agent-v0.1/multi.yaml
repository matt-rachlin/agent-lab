# PBS-Agent v0.1 — multi-domain tasks (fs + python + sometimes shell).
#
# Two tasks that intentionally need composed tool sequences. One of these
# uses success_predicate: db_query — chosen because the lab agent sandbox
# cannot mutate Postgres, so the db_query is a *read-only* meta-check that
# the task is correctly registered in lab.tasks; this lets us exercise the
# db_query predicate code path against real Postgres without inventing
# write-side state for the agent to manipulate.

suite: pbs-agent-v0.1
category: multi

tasks:

  # -------------------------------------------------------------------------
  - slug: multi-words-and-hash
    difficulty: medium
    description: |
      Read a file, compute its SHA-256 hash with python_eval, then write
      the hex digest to a second file. Tests fs_read + python_eval + fs_write
      composition.
    input: |
      Read 'message.txt' using fs_read. Then use python_eval to compute the
      SHA-256 hex digest of that EXACT file content (read it inside Python
      from /workspace/message.txt to avoid any encoding mismatch). Write
      the 64-character hex digest (lowercase, no extra text or newline) to
      a new file 'hash.txt' via fs_write mode='create'. Reply with 'done'.
    system_prompt_id: agent_system_hashing_v1
    tools:
      - name: fs_read
      - name: python_eval
      - name: fs_write
    max_turns: 5
    tool_budget: 6
    sandbox:
      workspace_files:
        # SHA-256 of "agent\n" == d20bc21bb3c7736d8d03ade3ddb4c68b665cdfbca6f6df0f7fdd192f37f59060
        # Verified via `printf 'agent\n' | sha256sum`.
        "message.txt": "agent\n"
    success_predicate:
      type: workspace_file_contains
      path: hash.txt
      substring: "d20bc21bb3c7736d8d03ade3ddb4c68b665cdfbca6f6df0f7fdd192f37f59060"
    rubric:
      type: tool_call
      target_tool: python_eval

  # -------------------------------------------------------------------------
  - slug: multi-db-self-check
    difficulty: medium
    description: |
      Exercises success_predicate type=db_query end-to-end. The agent's
      visible job is a small fs + python summary. The grading predicate
      runs a read-only SQL query against the lab DB confirming that
      this very task is registered — a meta-check that the predicate
      code path works against real Postgres (since the sandboxed agent
      cannot write to PG itself) — AND a workspace_file_equals check on
      mean.txt so the predicate isn't trivially passable.

      Task-author trap (F-009 EXP-006): the previous iteration used the
      db_query check alone. Because that query always returns 1 row for
      a registered task regardless of agent behaviour, qwen3-30b-a3b-moe
      fired zero tool calls and scored end_state=1.0 on every cell. The
      fix is the all_of composite below: the db_query sub-predicate keeps
      the meta-check meaningful, and the workspace_file_equals sub-
      predicate requires the agent to actually produce mean.txt with the
      correct arithmetic mean. Models that no-op fail the file half;
      models that misread the data fail the equals half. Same fix shape
      as F-005's code-find-and-fix-bug Surprise 2.
    input: |
      Use fs_read to read 'nums.csv' (single line, comma-separated integers).
      Use python_eval to compute the arithmetic mean (Python: sum(xs)/len(xs))
      as a floating-point value. Write the mean (e.g. '6.0') to a new file
      'mean.txt' via fs_write mode='create'. Reply with the mean.
    system_prompt_id: agent_system_v1
    tools:
      - name: fs_read
      - name: python_eval
      - name: fs_write
    max_turns: 5
    tool_budget: 6
    sandbox:
      workspace_files:
        # Mean of 2,4,6,8,10 is 6.0; verified: sum=30, n=5, 30/5=6.0.
        "nums.csv": "2,4,6,8,10\n"
    success_predicate:
      type: all_of
      predicates:
        # 1) db_query meta-check — confirms the predicate code path runs
        #    against real Postgres. Reads-only; the scorer refuses any
        #    write-like keyword (INSERT/UPDATE/etc).
        - type: db_query
          query: "SELECT slug FROM tasks WHERE suite = 'pbs-agent-v0.1' AND slug = 'multi-db-self-check' AND retired_at IS NULL"
          expects_rows: 1
        # 2) workspace_file_contains — requires evidence of actual tool use.
        #    mean.txt must contain "6.0" (the correct arithmetic mean of
        #    2,4,6,8,10). Substring match (not equals) so minor formatting
        #    variation across models is tolerated: "6.0", "6.00", and
        #    "The mean is 6.0" all pass; "6" alone, "12.5", "5.0", or a
        #    missing file all fail. Models that never call fs_write fail
        #    this half because mean.txt won't be in the snapshot at all.
        - type: workspace_file_contains
          path: mean.txt
          substring: "6.0"
    rubric:
      type: tool_call
      target_tool: python_eval
