# PBS-Agent v0.1 — code-domain tasks.
#
# Three tasks that need the agent to author, run, or debug small Python
# snippets via python_eval (plus fs tools to stage / inspect code).

suite: pbs-agent-v0.1
category: code

tasks:

  # -------------------------------------------------------------------------
  - slug: code-read-and-explain
    difficulty: easy
    description: |
      Open a small Python file and report what it does. Grades on whether
      the agent invoked fs_read and produced an explanation. Uses the
      trajectory judge — this is the explicit include_judge probe.
    input: |
      The workspace contains a Python file 'fizzbuzz.py'. Read it with the
      fs_read tool, then write a one-sentence plain-English explanation of
      what the function does to a new file 'explanation.txt' using fs_write
      mode='create'. Reply with 'done'.
    system_prompt_id: agent_system_v1
    tools:
      - name: fs_read
      - name: fs_write
      - name: fs_grep
    max_turns: 4
    tool_budget: 4
    sandbox:
      workspace_files:
        "fizzbuzz.py": |
          def classify(n: int) -> str:
              if n % 15 == 0:
                  return "fizzbuzz"
              if n % 3 == 0:
                  return "fizz"
              if n % 5 == 0:
                  return "buzz"
              return str(n)
    success_predicate:
      type: workspace_file_exists
      path: explanation.txt
      include_judge: true
      judge_model: gpt-oss-120b-cloud
    rubric:
      type: tool_call
      target_tool: fs_read
      expected_args:
        path: fizzbuzz.py

  # -------------------------------------------------------------------------
  - slug: code-write-and-execute
    difficulty: medium
    description: |
      Write a Python snippet that computes something and run it. Tests
      python_eval alongside fs_write.
    input: |
      Use the python_eval tool to compute the sum of the first 100 positive
      integers (1 through 100 inclusive). Then write the resulting integer
      (as a plain decimal string, no extra text) to a new file 'answer.txt'
      using fs_write mode='create'. Reply with 'done'.
    system_prompt_id: agent_system_v1
    tools:
      - name: python_eval
      - name: fs_write
    max_turns: 4
    tool_budget: 4
    success_predicate:
      type: workspace_file_equals
      path: answer.txt
      expected: "5050"
    rubric:
      type: tool_call
      target_tool: python_eval

  # -------------------------------------------------------------------------
  - slug: code-find-and-fix-bug
    difficulty: hard
    description: |
      Locate a buggy Python file via fs_grep, read it, then fix it by
      overwriting. Exercises grep + read + write + shell.

      Task-author trap (F-005 EXP-002): the success_predicate must NOT be
      a substring that already appears anywhere in the seed file — comments
      count. The previous iteration of this task pre-seeded a comment
      mentioning the target word; the `workspace_file_contains` check
      passed at sandbox-init time and every model — even ones that issued
      zero tool calls — scored 1.0. The fix is to require the BUG-FREE-FILE
      end-state: the buggy literal `print("good")` is gone AND the corrected
      `print("great")` is present. Both halves are needed; either alone is
      spoofable by a no-op trajectory. Predicates that can be satisfied by
      the seed must be flagged as a bug.
    input: |
      A buggy Python script lives somewhere under the 'src/' directory in
      the workspace. Currently it prints the word 'good' but it should
      print 'great'. Use fs_grep to find which file calls
      print with the buggy string, then use fs_write with mode='overwrite'
      to replace the file's contents with a corrected version that calls
      print with 'great' instead. Verify by running it with
      shell_exec ('python3 <path>'). Reply with the captured stdout.
    system_prompt_id: debug_assistant_v1
    tools:
      - name: fs_grep
      - name: fs_read
      - name: fs_write
      - name: shell_exec
    max_turns: 6
    tool_budget: 8
    sandbox:
      # Seed file uses the literal token "buggy-output" in the comment so
      # neither "good" nor "great" appears anywhere except inside the
      # `print("good")` call. The predicate's positive half (`print("great")`)
      # can ONLY arrive via fs_write; the negative half (`print("good")` gone)
      # can ONLY happen if the file was rewritten. Either change in isolation
      # is impossible because the predicate AND's them via two scorers.
      workspace_files:
        "src/cli/main.py": |
          # buggy-output literal needs to change from g_o_o_d to g_r_e_a_t
          print("good")
        "src/utils/other.py": "# unrelated\nprint('hello')\n"
    # Two-part predicate: the corrected literal MUST appear AND the buggy
    # literal MUST NOT remain. We use `workspace_file_contains` with the
    # exact `print("great")` token (not just "great") so the comment can't
    # spoof it; the negative half is provided by `tool_correctness` on
    # fs_write (the only way to flip the print statement). Future PBS-Agent
    # versions should add a `workspace_file_does_not_contain` predicate to
    # make the negative half explicit at the scorer level.
    success_predicate:
      type: workspace_file_contains
      path: src/cli/main.py
      substring: "print(\"great\")"
    rubric:
      type: tool_call
      target_tool: fs_grep
      expected_args:
        pattern: "good"
