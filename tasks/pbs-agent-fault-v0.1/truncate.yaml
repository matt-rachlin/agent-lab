# PBS-Agent fault-v0.1 — fault-truncate tasks.
#
# Task bodies adapted from pbs-agent-hard-v0.1 (data tier). Each task
# truncates the FIRST fs_read of the episode: the real call executes but the
# agent only sees the first `keep_chars` characters of the serialised result
# plus a "...[TRUNCATED]" marker. keep_chars is chosen so the truncated
# prefix does NOT contain the answer-determining rows. The fault fires once,
# so recovery = re-read (a later fs_read returns the full file) or a chunked
# read via shell_exec head/tail or python_eval open().read(). All tasks carry
# shell_exec + python_eval so a workaround always exists.

suite: pbs-agent-fault-v0.1
category: fault-truncate

tasks:

  # -------------------------------------------------------------------------
  - slug: truncate-json-top-spender
    difficulty: medium
    description: |
      Nested JSON aggregation (body from pbs-agent-hard-v0.1
      data-json-flatten-top-spender). Fault: the first fs_read of the episode
      is truncated to 200 chars — only a fragment of the first user (Alice)
      is visible; the actual top spender (Dave) is hidden past the cut.
      Recovery: notice the [TRUNCATED] marker and re-read (fs_read again, or
      shell_exec cat, or python_eval). Correct answer: Dave.
    input: |
      Your workspace contains data/users.json — a JSON array. Each element
      has fields: user_id, name, and events (array of objects with type and
      amount fields).

      For each user, sum the amount of all events where type == "purchase".
      Find the user with the highest total purchase amount.

      Write their name (exactly as it appears in the JSON) to
      /workspace/result.txt — no extra text, no trailing newline.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 13
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: truncate
          payload:
            keep_chars: 200
      workspace_files:
        "data/users.json": |
          [
            {"user_id": "u1", "name": "Alice", "events": [
              {"type": "purchase", "amount": 49.99},
              {"type": "purchase", "amount": 129.00},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 19.50}
            ]},
            {"user_id": "u2", "name": "Bob", "events": [
              {"type": "purchase", "amount": 299.00},
              {"type": "purchase", "amount": 15.00},
              {"type": "view", "amount": 0}
            ]},
            {"user_id": "u3", "name": "Carol", "events": [
              {"type": "view", "amount": 0},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 89.99}
            ]},
            {"user_id": "u4", "name": "Dave", "events": [
              {"type": "purchase", "amount": 450.00},
              {"type": "purchase", "amount": 75.25},
              {"type": "purchase", "amount": 30.00}
            ]},
            {"user_id": "u5", "name": "Eve", "events": [
              {"type": "purchase", "amount": 199.99},
              {"type": "view", "amount": 0},
              {"type": "purchase", "amount": 299.99}
            ]}
          ]
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "Dave"

  # -------------------------------------------------------------------------
  - slug: truncate-jsonl-median
    difficulty: medium
    description: |
      JSONL session analysis (body from pbs-agent-hard-v0.1
      data-jsonl-session-median-duration). Fault: the first fs_read is
      truncated to 200 chars (~2 of 18 event lines visible) — no complete
      session survives the cut. Recovery: re-read or chunked read.
      Correct answer: 180.
    input: |
      Your workspace contains data/events.jsonl — one JSON object per line.
      Each object has fields: session_id, event, ts (Unix timestamp), user.
      event values are: "start", "action", "error", "end".

      1. Find all session_ids that have at least one event with event=="error".
      2. For each such session that also has both a "start" and "end" event,
         compute duration = end_ts - start_ts (in seconds).
      3. Compute the median of those durations. For an odd count of values,
         the median is the middle value of the sorted list.

      Write the median as a plain integer to /workspace/result.txt.
      No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 12
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: truncate
          payload:
            keep_chars: 200
      workspace_files:
        "data/events.jsonl": |
          {"session_id":"S001","event":"start","ts":1700000000,"user":"alice"}
          {"session_id":"S002","event":"start","ts":1700000010,"user":"bob"}
          {"session_id":"S001","event":"action","ts":1700000045,"user":"alice"}
          {"session_id":"S003","event":"start","ts":1700000050,"user":"carol"}
          {"session_id":"S002","event":"error","ts":1700000060,"user":"bob"}
          {"session_id":"S001","event":"action","ts":1700000090,"user":"alice"}
          {"session_id":"S004","event":"start","ts":1700000100,"user":"dave"}
          {"session_id":"S002","event":"end","ts":1700000110,"user":"bob"}
          {"session_id":"S003","event":"action","ts":1700000120,"user":"carol"}
          {"session_id":"S001","event":"error","ts":1700000150,"user":"alice"}
          {"session_id":"S005","event":"start","ts":1700000160,"user":"eve"}
          {"session_id":"S004","event":"action","ts":1700000180,"user":"dave"}
          {"session_id":"S003","event":"end","ts":1700000200,"user":"carol"}
          {"session_id":"S001","event":"end","ts":1700000210,"user":"alice"}
          {"session_id":"S004","event":"error","ts":1700000220,"user":"dave"}
          {"session_id":"S005","event":"action","ts":1700000240,"user":"eve"}
          {"session_id":"S004","event":"end","ts":1700000280,"user":"dave"}
          {"session_id":"S005","event":"end","ts":1700000320,"user":"eve"}
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "180"

  # -------------------------------------------------------------------------
  - slug: truncate-inventory
    difficulty: medium
    description: |
      Inventory turnover computation (body from pbs-agent-hard-v0.1
      data-inventory-turnover). Fault: the first fs_read is truncated to 150
      chars — only the header and the first data row (Widget A) survive; the
      winner (Gadget Y, row 4) is hidden. An agent that trusts the truncated
      read answers Widget A and fails. Recovery: re-read. Correct answer:
      Gadget Y.
    input: |
      Your workspace contains data/inventory.csv with columns:
        product_id, product_name, begin_inventory, end_inventory, cogs

      For each product compute:
        avg_inventory = (begin_inventory + end_inventory) / 2
        turnover_rate = cogs / avg_inventory

      Skip any product where avg_inventory == 0.
      Find the product with the HIGHEST turnover_rate.

      Write its product_name (exactly as in the CSV) to /workspace/result.txt.
      No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 13
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: truncate
          payload:
            keep_chars: 150
      workspace_files:
        "data/inventory.csv": |
          product_id,product_name,begin_inventory,end_inventory,cogs
          P001,Widget A,500,320,3600
          P002,Widget B,200,180,400
          P003,Gadget X,1000,850,4500
          P004,Gadget Y,50,20,780
          P005,Doohickey,300,300,0
          P006,Thingamajig,150,90,2160
          P007,Whatsit,800,600,7000
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "Gadget Y"

  # -------------------------------------------------------------------------
  - slug: truncate-weighted-score
    difficulty: medium
    description: |
      Three-file weighted composite score (body from pbs-agent-hard-v0.1
      data-multi-file-weighted-score). Fault: the FIRST fs_read of the
      episode is truncated to 120 chars — whichever of the three files is
      read first arrives incomplete. Recovery: re-read that file (later
      fs_reads are clean) or fall back to shell/python reads. Correct
      answer: GammaVault.
    input: |
      Your workspace contains three CSV files:
        data/products.csv  — columns: product_id, name, category
        data/reviews.csv   — columns: review_id, product_id, rating, verified
        data/sales.csv     — columns: sale_id, product_id, units, price_per_unit

      For each product compute a weighted composite score:
        1. avg_rating: mean of rating for rows where verified == "true" only
        2. norm_units: (total units sold) / (max total units sold across all products)
        3. norm_revenue: (total revenue) / (max total revenue across all products)
           where revenue for a sale row = units * price_per_unit
        4. score = 0.4 * avg_rating + 0.3 * norm_units + 0.3 * norm_revenue

      Find the product with the highest score. Write its name (exactly as in
      products.csv) to /workspace/result.txt. No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 14
    tool_budget: 18
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: truncate
          payload:
            keep_chars: 120
      workspace_files:
        "data/products.csv": |
          product_id,name,category
          P01,AlphaBlend,Software
          P02,BetaStream,Hardware
          P03,GammaVault,Software
          P04,DeltaPulse,Hardware
          P05,EpsilonCore,Software
        "data/reviews.csv": |
          review_id,product_id,rating,verified
          R001,P01,4,true
          R002,P01,5,true
          R003,P01,3,true
          R004,P02,4,true
          R005,P02,5,true
          R006,P02,4,false
          R007,P02,3,true
          R008,P03,5,true
          R009,P03,5,true
          R010,P03,4,true
          R011,P04,2,true
          R012,P04,3,true
          R013,P04,4,false
          R014,P05,4,true
          R015,P05,5,true
          R016,P05,4,true
          R017,P05,3,true
        "data/sales.csv": |
          sale_id,product_id,units,price_per_unit
          S001,P01,150,29.99
          S002,P01,200,29.99
          S003,P02,80,149.99
          S004,P02,120,149.99
          S005,P03,300,19.99
          S006,P03,250,19.99
          S007,P04,60,99.99
          S008,P04,40,99.99
          S009,P05,180,49.99
          S010,P05,220,49.99
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "GammaVault"
