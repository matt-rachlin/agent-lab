# PBS-Agent fault-v0.1 — fault-wrong tasks.
#
# Task bodies adapted from pbs-agent-hard-v0.1 (code/data tiers). Each task
# replaces the result of the FIRST fs_read with a plausible-but-wrong
# variant of the real file (a `wrong_result` fault; the real call executes
# but its result is discarded). Every task input states a verifiable
# invariant of the TRUE data that the wrong variant violates: an agent that
# cross-checks detects the corruption and re-reads (later reads are clean);
# an agent that trusts the wrong result produces an answer that fails the
# predicate (verified — see /tmp/fault/verify_fault.py).
#
# Replacement payloads mimic the fs_read result shape
# ({content, size, truncated, path}) with `size` consistent with the
# replacement content so the fake is not trivially detectable by shape.

suite: pbs-agent-fault-v0.1
category: fault-wrong

tasks:

  # -------------------------------------------------------------------------
  - slug: wrong-topo-sort
    difficulty: medium
    description: |
      Kahn's algorithm topological sort (body from pbs-agent-hard-v0.1
      code-topo-sort). Fault: the first fs_read of src/graph.py returns a
      consistent-looking graph in which the ('typecheck','codegen') edge is
      reversed to ('codegen','typecheck'). Trusting it yields
      "parse,codegen,link,package,typecheck" — fails the predicate. The
      stated invariant (edge ('typecheck','codegen') must be present) is
      violated by the fake; recovery = re-read and compute on the real graph.
      Correct answer: parse,typecheck,codegen,link,package.
    input: |
      The file 'src/graph.py' defines a directed acyclic graph as an
      adjacency list (dict mapping node -> list of successors) and a list
      of directed edges. Your task:
      1. Read the file with fs_read.
      2. Implement Kahn's algorithm (BFS-based topological sort) and run it
         on the graph using python_eval or shell_exec. When multiple nodes
         have in-degree 0 at the same time, process them in alphabetical
         order (use a sorted list as the queue).
      3. Write the resulting node order as a comma-separated string
         (e.g. "A,B,C") to 'answer.txt' using fs_write mode='create'.

      IMPORTANT — data integrity check: the build system guarantees that the
      true src/graph.py contains exactly 5 edges and that the directed edge
      ('typecheck', 'codegen') is one of them (typecheck always precedes
      codegen). If the file content you obtained contradicts this invariant,
      that read was corrupted — discard it and obtain the file contents again
      (read it again, or print it via python_eval/shell_exec) before
      computing.

      Write ONLY the comma-separated node names, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: wrong_result
          payload:
            replacement:
              content: |
                # Directed edges: (from_node, to_node) means from_node must come before to_node
                edges = [
                    ('parse', 'typecheck'),
                    ('parse', 'codegen'),
                    ('codegen', 'typecheck'),
                    ('codegen', 'link'),
                    ('link', 'package'),
                ]

                # Adjacency list derived from edges above
                graph = {
                    'parse':     ['typecheck', 'codegen'],
                    'typecheck': [],
                    'codegen':   ['typecheck', 'link'],
                    'link':      ['package'],
                    'package':   [],
                }
              size: 436
              truncated: false
              path: /workspace/src/graph.py
      workspace_files:
        "src/graph.py": |
          # Directed edges: (from_node, to_node) means from_node must come before to_node
          edges = [
              ('parse', 'typecheck'),
              ('parse', 'codegen'),
              ('typecheck', 'codegen'),
              ('codegen', 'link'),
              ('link', 'package'),
          ]

          # Adjacency list derived from edges above
          graph = {
              'parse':     ['typecheck', 'codegen'],
              'typecheck': ['codegen'],
              'codegen':   ['link'],
              'link':      ['package'],
              'package':   [],
          }
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "parse,typecheck,codegen,link,package"

  # -------------------------------------------------------------------------
  - slug: wrong-param-count
    difficulty: medium
