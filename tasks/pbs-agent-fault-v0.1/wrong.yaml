      Static analysis: function with the most parameters (body from
      pbs-agent-hard-v0.1 code-param-count-analysis). Fault: the first
      fs_read returns a variant where train_model is trimmed to 4 params and
      preprocess inflated to 7 — trusting it yields "preprocess", which fails
      the predicate. Stated invariant: the max parameter count in the true
      file is exactly 10 (violated by the fake, whose max is 7). Recovery =
      re-read. Correct answer: train_model.
    input: |
      The file 'src/ml_pipeline.py' contains several Python function
      definitions. Your task:
      1. Read the file with fs_read.
      2. Determine which function has the greatest number of parameters
         (count all positional and keyword parameters declared in the
         function signature, including those with defaults).
      3. Write the name of that function to 'answer.txt' via fs_write
         mode='create'.

      IMPORTANT — data integrity check: this file is under signature audit;
      it is guaranteed that the true file defines exactly 6 functions and
      that the LARGEST signature among them declares exactly 10 parameters.
      If the content you obtained does not satisfy this invariant, that read
      was corrupted — discard it and obtain the file contents again (read it
      again, or print it via python_eval/shell_exec) before answering.

      Write ONLY the function name, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: wrong_result
          payload:
            replacement:
              content: |
                import os

                def load_data(path: str, delimiter: str = ',') -> list:
                    """Load CSV data from path."""
                    pass

                def process_data(df, columns, target, test_size=0.2, random_state=42):
                    """Split data into train/test sets."""
                    pass

                def train_model(X_train, y_train, model_type, learning_rate=0.01):
                    """Train a model with the given hyperparameters."""
                    pass

                def evaluate(model, X_test, y_test):
                    """Evaluate model on test set."""
                    pass

                def preprocess(data, scaler=None, imputer=None, encoder=None,
                               normalize=True, clip_outliers=False, verbose=False):
                    """Preprocess data with optional transformers."""
                    pass

                def save_results(path, metrics, model, config):
                    """Persist results to disk."""
                    pass
              size: 740
              truncated: false
              path: /workspace/src/ml_pipeline.py
      workspace_files:
        "src/ml_pipeline.py": |
