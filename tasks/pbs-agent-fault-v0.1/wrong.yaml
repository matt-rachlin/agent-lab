              """Evaluate model on test set."""
              pass

          def preprocess(data, scaler=None, imputer=None, encoder=None,
                         normalize=True):
              """Preprocess data with optional transformers."""
              pass

          def save_results(path, metrics, model, config):
              """Persist results to disk."""
              pass
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "train_model"

  # -------------------------------------------------------------------------
  - slug: wrong-lru-trace
    difficulty: medium
    description: |
      LRU cache trace replay (body from pbs-agent-hard-v0.1
      code-lru-cache-trace). Fault: the first fs_read of src/ops.txt returns
      the same operation list but with "capacity 2" instead of "capacity 3".
      Trusting it yields "-1,-1,30,-1,-1,50" — fails the predicate. Stated
      invariant: the true file declares capacity 3 (violated by the fake).
      Recovery = re-read. Correct answer: 10,-1,30,-1,40,50.
    input: |
      The file 'src/ops.txt' lists a sequence of LRU cache operations.
      Your task:
      1. Read the file with fs_read.
      2. Implement an LRU cache with the given capacity using python_eval or
         shell_exec. Do NOT use functools.lru_cache — implement it yourself
         (hint: OrderedDict works well).
      3. Replay all operations in order. For each GET operation record the
         return value (-1 if the key is not present).
      4. Write the get-results as a comma-separated string to 'answer.txt'
         via fs_write mode='create', in the order the gets appear.

      IMPORTANT — data integrity check: this trace was generated for a
      THREE-slot cache; the true src/ops.txt is guaranteed to declare
      "capacity 3" on its first line and to contain exactly 6 get
      operations. If the content you obtained contradicts this invariant,
      that read was corrupted — discard it and obtain the file contents
      again (read it again, or print it via python_eval/shell_exec) before
      replaying the trace.

      Write ONLY the comma-separated integers, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 12
    tool_budget: 16
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: wrong_result
          payload:
            replacement:
              content: |
                capacity 2
                put 1 10
                put 2 20
                put 3 30
                get 1
                put 4 40
                get 2
                get 3
                put 5 50
                get 1
                get 4
                get 5
              size: 92
              truncated: false
              path: /workspace/src/ops.txt
      workspace_files:
        "src/ops.txt": |
          capacity 3
          put 1 10
          put 2 20
          put 3 30
          get 1
          put 4 40
          get 2
          get 3
          put 5 50
          get 1
          get 4
          get 5
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "10,-1,30,-1,40,50"

  # -------------------------------------------------------------------------
  - slug: wrong-dup-txn
    difficulty: medium
    description: |
      Duplicate transaction-ID counting (body from pbs-agent-hard-v0.1
      data-duplicate-transaction-count; output format hardened to
      "duplicate_ids=<n>" for collision safety). Fault: the first fs_read
      returns a variant where the duplicated T003 row was replaced by a THIRD
      T001 row — only 2 distinct ids are duplicated, so trusting it yields
      duplicate_ids=2, which fails the predicate. Stated invariant: no txn_id
      appears more than twice in the true file (violated by the fake's
      triple T001). Recovery = re-read. Correct answer: duplicate_ids=3.
    input: |
      Your workspace contains data/transactions.csv with columns:
        txn_id, customer_id, amount, date

      Some transaction IDs appear more than once (duplicate rows). Count
      the number of DISTINCT txn_id values that appear more than once in
      the file (i.e., the count of IDs with duplicates, not the total
      number of extra rows).

      IMPORTANT — data integrity check: the export system guarantees that
      the true file has exactly 10 data rows and that NO txn_id appears more
      than twice. If the content you obtained violates this invariant, that
      read was corrupted — discard it and obtain the file contents again
      (read it again, or print it via python_eval/shell_exec) before
      counting.

      Write exactly one line to /workspace/result.txt in this format:
        duplicate_ids=<count>
      No extra text, no trailing newline.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: wrong_result
          payload:
            replacement:
              content: |
                txn_id,customer_id,amount,date
                T001,C01,150.00,2024-01-01
                T002,C02,200.00,2024-01-02
                T001,C01,150.00,2024-01-01
                T003,C03,75.50,2024-01-03
                T004,C04,300.00,2024-01-04
                T002,C02,200.00,2024-01-02
                T005,C05,125.00,2024-01-05
                T001,C01,150.00,2024-01-01
                T006,C06,450.00,2024-01-06
                T007,C07,90.00,2024-01-07
              size: 299
              truncated: false
              path: /workspace/data/transactions.csv
      workspace_files:
        "data/transactions.csv": |
          txn_id,customer_id,amount,date
          T001,C01,150.00,2024-01-01
          T002,C02,200.00,2024-01-02
          T001,C01,150.00,2024-01-01
          T003,C03,75.50,2024-01-03
          T004,C04,300.00,2024-01-04
          T002,C02,200.00,2024-01-02
          T005,C05,125.00,2024-01-05
          T003,C03,75.50,2024-01-03
          T006,C06,450.00,2024-01-06
          T007,C07,90.00,2024-01-07
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "duplicate_ids=3"
