          2024-01-15T08:00:03Z INFO  GET /api/products 200 120ms
          2024-01-15T08:00:05Z ERROR GET /api/orders 500 2340ms
          2024-01-15T08:00:07Z INFO  POST /api/users 201 88ms
          2024-01-15T08:00:09Z INFO  GET /api/products 200 95ms
          2024-01-15T08:00:11Z ERROR GET /api/users 503 1200ms
          2024-01-15T08:00:13Z INFO  GET /api/orders 200 310ms
          2024-01-15T08:00:15Z INFO  DELETE /api/users 200 55ms
          2024-01-15T08:00:17Z INFO  GET /api/products 200 78ms
          2024-01-15T08:00:19Z ERROR POST /api/orders 500 890ms
          2024-01-15T08:00:21Z INFO  GET /api/users 200 42ms
          2024-01-15T08:00:23Z INFO  GET /api/products 200 105ms
          2024-01-15T08:00:25Z INFO  GET /api/orders 200 220ms
          2024-01-15T08:00:27Z INFO  PUT /api/users 200 67ms
          2024-01-15T08:00:29Z INFO  GET /api/products 200 130ms
          2024-01-15T08:00:31Z ERROR GET /api/orders 500 3100ms
          2024-01-15T08:00:33Z INFO  GET /api/users 200 39ms
          2024-01-15T08:00:35Z INFO  GET /api/products 200 112ms
          2024-01-15T08:00:37Z INFO  POST /api/users 201 77ms
