  # -------------------------------------------------------------------------
  - slug: transient-interval-merge
    difficulty: medium
    description: |
      Off-by-one bug fix in interval merging (body from pbs-agent-hard-v0.1
      code-interval-merge-fix). Faults: the first fs_read returns a transient
      connection error and the first python_eval also fails transiently
      (neither call executes). Recovery: retry both. Correct answer: 1,5;6,11.
    input: |
      The file 'src/intervals.py' contains a function merge_intervals() with
      a subtle bug. The function should merge overlapping or touching intervals
      (e.g. [1,3] and [3,5] should merge to [1,5]) but currently misses some
      merges. Your task:
      1. Read the file with fs_read.
      2. Identify and fix the bug.
      3. Run the fixed function on this input:
         intervals = [(1, 3), (3, 5), (6, 9), (8, 11)]
      4. Write the result to 'answer.txt' as semicolon-separated intervals,
         each interval as "start,end" — for example: "1,5;6,11"
      Write ONLY the interval string, no extra text or newlines.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: fs_grep
      - name: python_eval
      - name: shell_exec
    max_turns: 10
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: error
        - call_index: 1
          tool: python_eval
          mode: error
      workspace_files:
        "src/intervals.py": |
          def merge_intervals(intervals):
              """Merge overlapping intervals. Returns list of (start, end) tuples."""
              if not intervals:
                  return []
              intervals = sorted(intervals)
              merged = [list(intervals[0])]
              for start, end in intervals[1:]:
                  # BUG: should be <= not < (adjacent intervals must also merge)
                  if start < merged[-1][1]:
                      merged[-1][1] = max(merged[-1][1], end)
                  else:
                      merged.append([start, end])
              return [tuple(x) for x in merged]

          if __name__ == '__main__':
              test = [(1, 3), (3, 5), (6, 9), (8, 11)]
              print(merge_intervals(test))
    success_predicate:
      type: workspace_file_contains
      path: answer.txt
      substring: "1,5;6,11"

  # -------------------------------------------------------------------------
  - slug: transient-reconcile
    difficulty: medium
    description: |
      Two-file payment reconciliation (body from pbs-agent-hard-v0.1
      data-payment-reconciliation). Faults: the first TWO fs_read attempts
      fail (transient error, then timeout; neither executes). Recovery
      requires persisting through back-to-back failures — the third fs_read
      attempt (and all later ones) succeed. Answers: MISSING:PAY008,
      MISMATCH:PAY004, UNEXPECTED:PAY009.
    input: |
      Your workspace contains two CSV files:
        data/expected_payments.csv  — columns: payment_id, vendor, amount, date
        data/bank_statement.csv     — columns: ref_id, vendor, amount, date

      Join on payment_id == ref_id. Categorize every discrepancy:
        - MISMATCH: same ID in both files but amounts differ
        - MISSING: ID in expected but absent from bank
        - UNEXPECTED: ID in bank but absent from expected

      Write to /workspace/result.txt exactly 3 lines (one per category, sorted
      alphabetically by category label), in this format:
        MISSING:<payment_id>
        MISMATCH:<payment_id>
        UNEXPECTED:<payment_id>
      where each value is the relevant ID. No extra text.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 12
    tool_budget: 16
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: error
        - call_index: 2
          tool: fs_read
          mode: timeout
      workspace_files:
        "data/expected_payments.csv": |
          payment_id,vendor,amount,date
          PAY001,Acme Corp,1500.00,2024-02-01
          PAY002,Beta LLC,750.50,2024-02-03
          PAY003,Acme Corp,200.00,2024-02-05
          PAY004,Gamma Inc,3200.00,2024-02-07
          PAY005,Delta Co,450.00,2024-02-09
          PAY006,Beta LLC,1100.00,2024-02-11
          PAY007,Acme Corp,825.75,2024-02-13
          PAY008,Gamma Inc,600.00,2024-02-15
        "data/bank_statement.csv": |
          ref_id,vendor,amount,date
          PAY001,Acme Corp,1500.00,2024-02-01
          PAY002,Beta LLC,750.50,2024-02-03
          PAY003,Acme Corp,200.00,2024-02-05
          PAY004,Gamma Inc,3100.00,2024-02-07
          PAY005,Delta Co,450.00,2024-02-09
          PAY006,Beta LLC,1100.00,2024-02-11
          PAY009,Epsilon Ltd,275.00,2024-02-12
          PAY007,Acme Corp,825.75,2024-02-13
    success_predicate:
      type: all_of
      predicates:
        - type: workspace_file_contains
          path: result.txt
          substring: "MISSING:PAY008"
        - type: workspace_file_contains
          path: result.txt
          substring: "MISMATCH:PAY004"
        - type: workspace_file_contains
          path: result.txt
          substring: "UNEXPECTED:PAY009"
