# PBS-Agent fault-v0.1 — fault-transient tasks.
#
# Task bodies adapted from pbs-agent-hard-v0.1 (medium tier). Each task adds
# a deterministic `sandbox.faults` schedule of transient errors/timeouts
# early-to-mid chain. The faulted call DOES NOT execute and fires exactly
# once — retrying the same call later in the episode succeeds, so recovery
# means: notice the transient error, retry, and finish the task normally.
# Expected answers are unchanged from the verified originals.

suite: pbs-agent-fault-v0.1
category: fault-transient

tasks:

  # -------------------------------------------------------------------------
  - slug: transient-csv-join
    difficulty: medium
    description: |
      CSV join + aggregation (body from pbs-agent-hard-v0.1
      data-csv-join-revenue-by-region). Faults: the first fs_read returns a
      transient connection error (call not executed) and the first
      python_eval times out (call not executed). Recovery: retry both —
      the second attempt of each succeeds. Correct answer: South,1020.50.
    input: |
      You have two CSV files in your workspace:
        data/orders.csv    — columns: order_id, customer_id, amount, status
        data/customers.csv — columns: customer_id, name, region

      Join them on customer_id. Consider ONLY orders with status="completed".
      Sum the amount for each region. Find the region with the highest total
      completed revenue.

      Write a single line to /workspace/result.txt in exactly this format:
        <region>,<total>
      where <total> is formatted to 2 decimal places (e.g. South,1020.50).
      No extra text, no newline after the value.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 10
    tool_budget: 14
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: error
        - call_index: 1
          tool: python_eval
          mode: timeout
      workspace_files:
        "data/orders.csv": |
          order_id,customer_id,amount,status
          1001,C01,250.00,completed
          1002,C02,180.50,completed
          1003,C03,430.00,cancelled
          1004,C01,90.00,completed
          1005,C04,320.75,completed
          1006,C02,150.00,refunded
          1007,C05,200.00,completed
          1008,C03,510.00,completed
          1009,C04,75.50,cancelled
          1010,C05,640.00,completed
        "data/customers.csv": |
          customer_id,name,region
          C01,Alice,North
          C02,Bob,South
          C03,Carol,East
          C04,Dave,North
          C05,Eve,South
    success_predicate:
      type: workspace_file_contains
      path: result.txt
      substring: "South,1020.50"

