    description: |
      Log parsing + percentile arithmetic (body from pbs-agent-hard-v0.1
      data-log-parse-p95-latency). Fault: the first fs_read times out
      (call not executed). Recovery: retry the read — second attempt
      succeeds. Correct answer: 2340.
    input: |
      Your workspace contains data/access.log. Each line has the format:
        <timestamp> <LEVEL> <METHOD> <endpoint> <status> <latency>ms

      Parse every line. Sort all latency values ascending. Compute the p95
      latency using the formula: value at index ceil(0.95 * n) - 1 (0-based)
      where n is the total number of log lines.

      Write the p95 latency as a plain integer (milliseconds, no "ms" suffix,
      no other text) to /workspace/result.txt.
    system_prompt_id: tool_use_system_v2
    tools:
      - name: fs_read
      - name: fs_write
      - name: python_eval
    max_turns: 10
    tool_budget: 13
    sandbox:
      faults:
        - call_index: 1
          tool: fs_read
          mode: timeout
      workspace_files:
