# LiteLLM proxy config.
#
# Routing matrix (Phase 19b):
#   * Phase 19a big-model lanes (qwen3-30b-a3b-moe, gpt-oss-20b-local,
#     phi-4-reasoning-14b, …) -> llama-swap on host port 8080. llama-swap
#     owns the matrix-group / TTL eviction logic; clients MUST send
#     keep_alive=0 (see docs/runbooks/llama-swap-runbook.md).
#   * Pre-existing local Ollama models (qwen3-14b-q4, llama3.1-8b-q4, …)
#     still route directly to Ollama on 11434 — they are fast to load and
#     don't benefit from llama-swap's grouping.
#   * Ollama Cloud models (gpt-oss-120b-cloud, glm-5.1-cloud, …) keep
#     their direct routes; cloud isn't VRAM-bound.

model_list:
  # ---- Phase 19a local big models (routed through llama-swap) ----
  - model_name: qwen3-30b-a3b-moe
    litellm_params:
      model: openai/qwen3-30b-a3b-moe
      api_base: http://host.containers.internal:8080/v1
      api_key: dummy
      timeout: 600

  - model_name: gpt-oss-20b-local
    litellm_params:
      model: openai/gpt-oss-20b-local
      api_base: http://host.containers.internal:8080/v1
      api_key: dummy
      timeout: 600

  - model_name: phi-4-reasoning-14b
    litellm_params:
      model: openai/phi-4-reasoning-14b
      api_base: http://host.containers.internal:8080/v1
      api_key: dummy
      timeout: 600

  - model_name: hermes-4.3-36b
    litellm_params:
      model: openai/hermes-4.3-36b
      api_base: http://host.containers.internal:8080/v1
      api_key: dummy
      timeout: 600

  # ---- Phase 19e quality-ceiling lane (routed through llama-swap) ----
  # Long timeout (1800s = 30min) because 70B hybrid offload runs ~6-10
  # tok/s; a single PBS-Agent turn at 1024 output tokens is 100-170s,
  # and cold load adds 60-90s. Sweep runner gates this model via
  # --allow-slow-models (capabilities.slow_mode in lab.models).
  - model_name: llama-3.3-70b-q4-local
    litellm_params:
      model: openai/llama-3.3-70b-q4
      api_base: http://host.containers.internal:8080/v1
      api_key: dummy
      timeout: 1800

  # ---- local Ollama models (12GB-fitting) ----
  - model_name: qwen3-14b-q4
    litellm_params:
      model: ollama_chat/qwen3:14b-q4_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: qwen3-8b-q5
    litellm_params:
      model: ollama_chat/qwen3:8b-q5_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: llama3.1-8b-q4
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q4_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: phi-4-q4
    litellm_params:
      model: ollama_chat/phi-4:14b-q4_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: gemma3-12b-q4
    litellm_params:
      model: ollama_chat/gemma3:12b-it-q4_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: gemma4-12b
    litellm_params:
      model: ollama_chat/gemma4:12b
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: qwen3-coder-30b
    litellm_params:
      model: ollama_chat/qwen3-coder:30b
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: qwen2.5-coder-32b-q4_k_m
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b-instruct-q4_K_M
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: devstral-24b
    litellm_params:
      model: ollama_chat/devstral:24b
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: qwen3-8b
    litellm_params:
      model: ollama_chat/qwen3:8b
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: phi4
    litellm_params:
      model: ollama_chat/phi4:latest
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  - model_name: qwen2.5-coder-7b-q8
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b-instruct-q8_0
      api_base: http://host.containers.internal:11434
      keep_alive: 5m

  # ---- Ollama Cloud models (proxied transparently by local daemon) ----
  - model_name: gpt-oss-20b-cloud
    litellm_params:
      model: ollama_chat/gpt-oss:20b-cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 600

  - model_name: gpt-oss-120b-cloud
    litellm_params:
      model: ollama_chat/gpt-oss:120b-cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 600

  - model_name: glm-5.1-cloud
    litellm_params:
      model: ollama_chat/glm-5.1:cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 600

  - model_name: qwen3-coder-480b-cloud
    litellm_params:
      model: ollama_chat/qwen3-coder:480b-cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 900

  - model_name: deepseek-v31-671b-cloud
    litellm_params:
      model: ollama_chat/deepseek-v3.1:671b-cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 900

  - model_name: kimi-k2-thinking-cloud
    litellm_params:
      model: ollama_chat/kimi-k2-thinking
      api_base: http://host.containers.internal:11434
      keep_alive: 5m
      max_tokens: 16384
      timeout: 900

  - model_name: qwen3-vl-235b-cloud
    litellm_params:
      model: ollama_chat/qwen3-vl:235b-cloud
      api_base: http://host.containers.internal:11434
      max_tokens: 16384
      timeout: 900

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600
  num_retries: 3
  fallbacks:
    - gpt-oss-120b-cloud: ["gpt-oss-20b-cloud", "qwen3-14b-q4"]
    - qwen3-coder-480b-cloud: ["gpt-oss-120b-cloud"]
    - deepseek-v31-671b-cloud: ["gpt-oss-120b-cloud"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

router_settings:
  routing_strategy: simple-shuffle
  # Cooldown was 30s; bumped to 60s so a transient cold-load 502 from
  # llama-swap doesn't drop a model out of the routing pool for too long,
  # but is still long enough to dodge a hot crash-loop. (Phase 19e #74.)
  cooldown_time: 60
  # Issue #74: cold-load 502 from llama-swap.
  # When the big-model lane (llama-3.3-70b-q4-local, qwen3-30b-a3b-moe,
  # gpt-oss-20b-local, phi-4-reasoning-14b) has TTL'd out, the next call
  # forces a fresh llama.cpp process to spawn. The first 1-2s of that
  # spawn occasionally exits prematurely (upstream process supervisor
  # race) and llama-swap returns HTTP 502 "upstream command exited
  # prematurely but successfully". A retry usually succeeds because the
  # second attempt gets the now-warm process.
  # `num_retries: 3` above counts overall attempts; `InternalServerError-
  # Retries: 2` ensures 5xx responses (including 502 BadGateway from
  # llama-swap) are explicitly retried before falling back. Other error
  # classes default to LiteLLM's normal behavior.
  retry_policy:
    InternalServerErrorRetries: 2
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 2
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
  # Don't let a single 502 cool down a llama-swap-backed model immediately
  # (it'd fall back to a smaller model and lose the experiment cell's
  # apples-to-apples comparison). Three consecutive 5xx in a minute is
  # still a real outage and should trip cooldown.
  allowed_fails_policy:
    InternalServerErrorAllowedFails: 3
    TimeoutErrorAllowedFails: 3
