# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json
#
# llama-swap — VRAM-aware multi-model orchestrator for the lab (Phase 19b).
#
# Sits between LiteLLM (port 4000) and the model servers (Ollama on 11434,
# llama-server on per-model ports 10001+). LiteLLM routes the new Phase 19a
# big-model traffic through this proxy on port 8080; small Ollama models
# keep their direct LiteLLM routes unchanged.
#
# Strategy: legacy `groups` (not the matrix DSL) — the plan calls for
# explicit named groups with exclusive=true semantics, which maps cleanly
# to swap=true/exclusive=true.
#
# Models registered here today (2026-05-27): only those with a complete
# GGUF on disk under /data/models/gguf/. Hermes-4.3-36B and Llama-3.3-70B
# downloads are incomplete; xLAM-2-7b-fc-r has no upstream GGUF yet.
# These will be added when the GGUFs land — see docs/runbooks/llama-swap-runbook.md.

healthCheckTimeout: 500
logLevel: info
logToStdout: proxy
startPort: 10001
globalTTL: 600 # default unload after 10 min idle; per-model override below

# Reusable command snippets.
#
# LLAMA_SERVER is the llama.cpp `llama-server` binary on this host. Phase 19d
# rebuilt llama.cpp with CUDA backend (commit 66d65ec29 / b8183) into a
# separate build-cuda/ tree so the Vulkan build/ stays intact for fallback.
# CUDA build uses CUDA 12.9 toolkit (12.8 had glibc 2.42 noexcept header
# conflicts with cospi/sinpi/rsqrt; we patched crt/math_functions.h to add
# noexcept (true) to the device-builtin decls — see runbook). Compute
# capability sm_86 (RTX 3080 Ti). Host compiler gcc-14.
#
# LD_LIBRARY_PATH must include the CUDA build dir so the bundled
# libggml-*.so.0 / libllama.so.0 / libmtmd.so.0 are resolved (the binary
# does NOT have RPATH baked in for /data/apps/_vendor/...).
macros:
  "LLAMA_SERVER": "/data/apps/_vendor/llama.cpp/build-cuda/bin/llama-server"
  "LD_LIB": "/data/apps/_vendor/llama.cpp/build-cuda/bin"
  "MODELS_DIR": "/data/models/gguf"

  # Common flags for medium-class models (14B-class). With ~8.5 GB free
  # of 12 GB (rerank server persists at ~2.6 GB in small-tools), an 8.6 GB
  # Q4_K_M model cannot fully offload — use -ngl 25 (smoked clean Phase 19d).
  "default_args_medium": "--port ${PORT} --host 127.0.0.1 --ctx-size 8192 -ngl 25"

  # Common flags for the 30B-A3B MoE: full GPU offload of attention,
  # expert tensors on CPU via `-ot` regex. Per research (plan §19b).
  "default_args_moe_30b": "--port ${PORT} --host 127.0.0.1 --ctx-size 8192 -ngl 99 -ot 'exps=CPU'"

  # Common flags for 20B-class MXFP4 (gpt-oss-20b). gpt-oss-20b is a MoE
  # (~21B total / 3.6B active); full MXFP4 needs ~12 GB which won't fit
  # the ~8.5 GB free window. Use the same MoE hybrid pattern as Qwen3 MoE:
  # offload all attention to GPU, keep expert tensors on CPU via -ot.
  # Smoked clean Phase 19d at ~6.6 GB VRAM with this layout.
  "default_args_20b": "--port ${PORT} --host 127.0.0.1 --ctx-size 8192 -ngl 99 -ot 'exps=CPU'"

# ---------------------------------------------------------------------------
# models — each entry maps a model ID to a launch command and a group.
#
# Naming convention: the model ID here matches the litellm_id in lab.models
# and the LiteLLM model_name in conf/litellm-config.yaml. Keeping these
# in sync is what makes `lab agent run --model X` work end-to-end.
# ---------------------------------------------------------------------------
models:
  # ---- Phase 19a additions, llama-server backend (GGUFs on disk today) ----

  "qwen3-30b-a3b-moe":
    cmd: |
      ${LLAMA_SERVER}
      ${default_args_moe_30b}
      --model ${MODELS_DIR}/qwen3-30b-a3b-moe/Qwen3-30B-A3B-Q4_K_M.gguf
      --jinja
    env:
      - "LD_LIBRARY_PATH=${LD_LIB}"
    name: "Qwen3-30B-A3B (MoE, 3B active)"
    description: "Local headline model. Q4_K_M MoE with experts on CPU."
    ttl: 600

  "gpt-oss-20b-local":
    cmd: |
      ${LLAMA_SERVER}
      ${default_args_20b}
      --model ${MODELS_DIR}/gpt-oss-20b-local/gpt-oss-20b-mxfp4.gguf
      --jinja
    env:
      - "LD_LIBRARY_PATH=${LD_LIB}"
    name: "gpt-oss 20B (local, MXFP4)"
    description: "Local MXFP4 reasoning model, 21B total / 3.6B active."
    ttl: 600

  "phi-4-reasoning-14b":
    cmd: |
      ${LLAMA_SERVER}
      ${default_args_medium}
      --model ${MODELS_DIR}/phi-4-reasoning-14b/microsoft_Phi-4-reasoning-plus-Q4_K_M.gguf
      --jinja
    env:
      - "LD_LIBRARY_PATH=${LD_LIB}"
    name: "Phi-4 Reasoning Plus 14B"
    description: "Math/reasoning specialist; beats DSR1-distill-70B on AIME 2025."
    ttl: 600

  # Hermes 4.3 36B — landed 2026-05-27. ~21 GB Q4_K_M; far too big to
  # fully offload on a 12 GB card. Use hybrid offload with -ngl 22 +
  # q8_0 KV cache: smoked clean Phase 19d at ~11.4 GB VRAM with
  # ctx-size 8192. Headroom is tight — leaves ~600 MB free which is
  # enough for response generation but bigger contexts may OOM, see
  # runbook. Assigned to big-llm group (exclusive).
  "hermes-4.3-36b":
    cmd: |
      ${LLAMA_SERVER}
      --port ${PORT} --host 127.0.0.1 --ctx-size 8192
      --n-gpu-layers 22 -ctk q8_0 -ctv q8_0
      --model ${MODELS_DIR}/hermes-4.3-36b/NousResearch_Hermes-4.3-36B-Q4_K_M.gguf
      --jinja
    env:
      - "LD_LIBRARY_PATH=${LD_LIB}"
    name: "Hermes 4.3 36B (Q4_K_M, hybrid offload)"
    description: "High-context generalist, 512K context, reliable JSON tool calling."
    ttl: 600

  # ---- Existing Ollama-backed small/medium models, proxied via llama-swap ----
  #
  # These already run on Ollama (port 11434). We register them in llama-swap
  # so the matrix-group logic can evict them when a big model needs the GPU.
  # `cmd` is a no-op shell because Ollama manages its own lifetime; we just
  # tell llama-swap which Ollama URL to proxy to and set keep_alive=0 on
  # every request (the lab client discipline — see runbook).

  "qwen3-14b-q4":
    cmd: "sleep infinity" # placeholder — Ollama is the real server
    proxy: "http://127.0.0.1:11434"
    checkEndpoint: "/api/version"
    useModelName: "qwen3:14b-q4_K_M"
    name: "Qwen3 14B Q4 (via Ollama)"
    ttl: 300

  "qwen3-reranker-0.6b":
    cmd: "sleep infinity"
    proxy: "http://127.0.0.1:8401"
    checkEndpoint: "/healthz"
    name: "Qwen3 Reranker 0.6B (host-side HTTP service)"
    ttl: 0 # always-on; managed by the rerank.service systemd unit

# ---------------------------------------------------------------------------
# groups — explicit VRAM coexistence rules.
#
# Per plan §19b:
#   small-tools  : rerankers + 1 small LLM, always hot
#   medium-llm   : one of qwen3-14b-q4 / phi-4-reasoning-14b / xlam-2-7b
#   big-llm      : qwen3-30b-a3b-moe + gpt-oss-20b-local (exclusive)
#   ceiling-llm  : llama-3.3-70b-q4 (reserved; model not yet on disk)
#   embedder-big : qwen3-embedding-8b-q8 (reserved; not yet registered)
#
# Group semantics:
#   swap: true       — only one member can run at a time within the group
#   exclusive: true  — loading a member evicts members of OTHER groups
# ---------------------------------------------------------------------------
groups:
  "small-tools":
    swap: false # rerankers should not evict each other
    exclusive: false # never evict big models when a reranker is hit
    persistent: true # keep loaded across other-group swaps
    members:
      - "qwen3-reranker-0.6b"

  "medium-llm":
    swap: true
    exclusive: true
    members:
      - "qwen3-14b-q4"
      - "phi-4-reasoning-14b"

  "big-llm":
    swap: true
    exclusive: true
    members:
      - "qwen3-30b-a3b-moe"
      - "gpt-oss-20b-local"
      - "hermes-4.3-36b" # added Phase 19c, GGUF landed 2026-05-27
  #
  # ceiling-llm (llama-3.3-70b-q4): DEFERRED — GGUF on disk but adding
  #   to llama-swap is a Phase 19e task per plan.
  #   Use --n-gpu-layers 21 --ctx-size 8192 -ctk q8_0 -ctv q8_0.
  #
  # embedder-big (qwen3-embedding-8b-q8): DEFERRED — not yet pulled.
  #
  # xlam-2-7b-fc-r: NO UPSTREAM GGUF (re-checked 2026-05-27 against
  #   bartowski / unsloth / mradermacher / Salesforce). Only xLAM-1
  #   (xLAM-7b-fc-r) GGUFs exist. Track upstream.
