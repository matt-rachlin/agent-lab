# EXP-003a — Bash KB retrieval-quality sweep
# Plan: docs/exp/EXP-003a.md
#
# This is NOT an agent sweep. It does not use the standard SweepRunner;
# scripts/retrieval_sweep.py reads this file and runs the matrix directly.
# We keep the config in conf/sweep/ for symmetry and pre-registration.

experiment:
  slug: EXP-003a
  title: "Bash KB retrieval-quality sweep — alpha × k"
  hypothesis: "Three hypotheses on hybrid retrieval blend (alpha) and top-k on the bash KB"
  plan_path: docs/exp/EXP-003a.md

kb:
  name: bash
  # Fixed — neither chunk-size nor embedding-model is varied here.
  embedding_model: qwen3-embedding:8b-q8_0

queries:
  n_target: 50
  # The eval_retrieval module generates queries with this model.
  # Same model the lab used for EXP-002's judge slice — keeps quota in
  # one place.
  question_model: qwen3:14b-q4_K_M
  # Cache path (relative to repo root) — queries are written once and
  # re-read across cells.
  cache_path: analysis/EXP-003a/queries.jsonl

matrix:
  alpha: [0.0, 0.25, 0.5, 0.75, 1.0]
  k: [1, 3, 5, 10]
  # MRR is computed at k=10 regardless (see EXP-003a.md §Metrics).

pilot:
  enabled: true
  n_queries: 5
  cells:
    - {alpha: 0.5, k: 5}
    - {alpha: 0.0, k: 5}

outputs:
  summary: analysis/EXP-003a/SUMMARY.md
  verdicts: analysis/EXP-003a/verdicts.md
  raw: analysis/EXP-003a/raw.csv
  best_configs: analysis/EXP-003a/best_configs.csv
