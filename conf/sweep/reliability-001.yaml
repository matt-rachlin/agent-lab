# RELIABILITY-001 — N=8 seeds × 5 PBS tasks × 3 local models, 1 config.
# Goal: surface intrinsic variance, populate pass^k (k=4, 8), get bootstrap CIs.

experiment:
  slug: RELIABILITY-001
  title: "Reliability: variance characterization for 3 local 12 GB models at N=8 seeds"
  hypothesis: "On easy/medium PBS tasks, llama3.1-8b-q4 will have pass^8/pass@1 >= 0.75; qwen3-14b-q4 will have visible thinking-mode token-budget pressure even at max_tokens=1024."
  plan_path: docs/exp/RELIABILITY-001.md

tasks:
  suite: PBS-v0.1
  slugs:
    - math-001          # easy arithmetic
    - math-002          # easy time arithmetic
    - fmt-001           # easy format-following
    - know-001          # easy knowledge
    - know-004          # medium knowledge (Westphalia year)

models:
  - qwen3-14b-q4
  - llama3.1-8b-q4
  - gemma3-12b-q4

configs:
  - name: greedy-1024
    temperature: 0.0
    top_p: 1.0
    max_tokens: 1024
    scaffold: single_turn

seeds: [1, 2, 3, 4, 5, 6, 7, 8]

max_concurrency: 1
request_timeout_sec: 300
