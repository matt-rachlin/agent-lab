# EXP-002b — qwen3-14b-q4 reasoning-ON ablation
# Plan: docs/exp/EXP-002b-qwen3-reasoning-on-ablation.md
# Matched to EXP-002 (docs/exp/EXP-002.md): same tasks, seeds, config, scorers.
# Only difference: 1 model, with `think: true` (Ollama default-on).
# 12 tasks × 1 model × 1 config × 8 seeds = 96 cells.
# Estimated wall time: ~1-2 hr on local GPU.

experiment:
  slug: EXP-002b
  title: "qwen3-14b-q4 reasoning-ON ablation (matched to EXP-002)"
  hypothesis: "H1: think:true qwen3-14b-q4 end_state mean is lower than EXP-002's 0.750 baseline. Pre-registered refutation threshold think:true >= 0.55; CONFIRMED if < 0.30; MIXED in between."
  plan_path: docs/exp/EXP-002b-qwen3-reasoning-on-ablation.md

tasks:
  suite: pbs-agent-v0.1
  # No slugs filter — pick up all 12 PBS-Agent v0.1 tasks, same as EXP-002.

models:
  - qwen3-14b-q4

configs:
  - name: greedy-1024
    temperature: 0.0
    top_p: 1.0
    max_tokens: 1024
    scaffold: single_turn   # runner dispatches to agent path on max_turns>1

# The single ablation knob: reasoning ON. EXP-002 used `think: false`.
model_defaults:
  qwen3-14b-q4:
    extra:
      think: true

seeds: [1, 2, 3, 4, 5, 6, 7, 8]

max_concurrency: 1
request_timeout_sec: 600
