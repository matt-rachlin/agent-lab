# EXP-001b — qwen3 reasoning-mode + max_tokens ablation
# Plan: docs/exp/EXP-001b.md
# 24 tasks × 1 model × 2 configs × 8 seeds = 384 cells

experiment:
  slug: EXP-001b
  title: "qwen3 reasoning-mode + max_tokens ablation"
  hypothesis: "qwen3 reasoning-mode + max_tokens ablation (3 hypotheses isolating H3's confound)"
  plan_path: docs/exp/EXP-001b.md

tasks:
  suite: PBS-v0.1
  # No slugs filter — all 24 PBS-v0.1 tasks

models:
  - qwen3-14b-q4

configs:
  - name: greedy-2048-thinking
    temperature: 0.0
    top_p: 1.0
    max_tokens: 2048
    scaffold: single_turn

  - name: greedy-1024-no-think
    temperature: 0.0
    top_p: 1.0
    max_tokens: 1024
    scaffold: single_turn
    extra:
      think: false

seeds: [1, 2, 3, 4, 5, 6, 7, 8]

max_concurrency: 1
request_timeout_sec: 600
